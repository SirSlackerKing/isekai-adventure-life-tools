<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Touno Island Calculator</title>

<style>
*{
box-sizing:border-box;
font-family:Segoe UI, system-ui, -apple-system;
}

body{
margin:0;
background:#eef2ff;
color:#111;
}

.container{
max-width:720px;
margin:auto;
padding:12px;
}

.header{
text-align:center;
margin-bottom:14px;
}

.home{
font-size:14px;
margin-bottom:6px;
color:#6366f1;
}

h2{
margin:0 0 12px;
font-size:20px;
}

.card{
background:white;
border-radius:16px;
padding:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:14px;
}

.small{
font-size:12px;
opacity:.65;
}

.big{
font-size:28px;
font-weight:bold;
text-align:center;
margin:14px 0;
color:#ec4899;
}

/* INPUT */
input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #d1d5db;
}

/* ICON INPUT */
.input-icon{
display:flex;
gap:10px;
background:#f8fafc;
border-radius:14px;
padding:6px 10px;
border:1px solid #e5e7eb;
}

.input-icon img{
width:26px;
height:26px;
border-radius:8px;
}

.input-icon input{
border:none;
background:transparent;
flex:1;
}

/* SUFFIX */
.input-suffix{
display:flex;
align-items:center;
gap:6px;
background:#f8fafc;
border:1px solid #e5e7eb;
border-radius:14px;
padding:6px 10px;
white-space:nowrap;
}

.input-suffix input{
border:none;
flex:1;
background:transparent;
}

.result{
background:#f8fafc;
padding:12px;
border-radius:10px;
margin-top:10px;
}

/* RESULT ICON */
.result-row{
display:flex;
gap:12px;
}

.result-icon{
width:42px;
height:42px;
border-radius:10px;
background:#f1f5f9;
display:flex;
align-items:center;
justify-content:center;
}

.result-icon img{
width:26px;
height:26px;
border-radius:8px;
}

/* HIGHLIGHT */
.highlight{
color:#6366f1;
font-weight:600;
}

/* ANIMATION */
.fade{
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:.4; transform:translateY(4px)}
to{opacity:1; transform:translateY(0)}
}

button{
height:40px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
}

.actions{
display:flex;
gap:10px;
}
.actions button{flex:1;}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>Touno Island Calculator</h2>
</div>

<!-- RESULT -->
<div class="card">
<h2>📊 Result</h2>

<div class="result fade">
<div class="result-row">
<div class="result-icon">
<img src="images/strollpoint.png">
</div>
<div id="resourceBox"></div>
</div>
</div>

<div class="result fade">
<div class="result-row">
<div class="result-icon">
<img src="images/ranking-icon.png">
</div>
<div id="stampBox"></div>
</div>

<div class="small">
* 1 Stamina = at least 200 Stamp Point
</div>
</div>

<div class="big fade" id="coinBox"></div>
</div>

<!-- KAGURA -->
<div class="card">
<h2>💃 Kagura Dance Calculator</h2>

<div class="small">Calculate your faith from coin</div>

<div class="input-suffix">
<input id="base"><span>B</span>
</div>

<input id="useCoin" placeholder="Coin">

<div class="result fade" id="kaguraBox"></div>

<hr>

<div class="small">How many coins needed?</div>

<div class="input-suffix">
<input id="targetPower"><span>B</span>
</div>

<div class="result fade" id="kaguraNeedBox"></div>
</div>

</div>

<script>

/* === HELPERS === */
function get(id){
return parseFloat(document.getElementById(id).value)||0
}

function comma(n){
return n.toLocaleString("en-US")
}

/* AUTO SCALE B → T → Q */
function formatBT(v){
if(v>=1e6) return (v/1e6).toFixed(3).replace(/\.?0+$/,"")+"Q"
if(v>=1e3) return (v/1e3).toFixed(3).replace(/\.?0+$/,"")+"T"
return v.toFixed(2).replace(/\.?0+$/,"")+"B"
}

/* === UPDATE === */
function update(){

let mochi=100
let pack=200
let regen=50

let total=mochi+pack+regen

resourceBox.innerHTML=
"Stamina: "+comma(total)

let stamp=total*200
stampBox.innerHTML=
"Stamp: "+comma(stamp)

let coin=Math.floor(stamp/200000)*10
coinBox.innerHTML=comma(coin)

/* KAGURA */
let base=get("base")
let coinUse=get("useCoin")

let score=base*coinUse

kaguraBox.innerHTML=
comma(base)+" B × "+comma(coinUse)+" Coin = <span class='highlight'>"+formatBT(score)+"</span>"

let need=0
if(get("targetPower")>0 && base>0){
need=Math.ceil(get("targetPower")/base)
}

kaguraNeedBox.innerHTML=
"Needed Coin: "+comma(need)

}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",update)
})

update()

</script>

</body>
</html>
