<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Touno Island Calculator</title>

<style>
*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{
margin:0;
background:#eef2ff;
display:flex;
justify-content:center;
}

.container{
width:900px;
padding:20px;
}

.card{
background:white;
border-radius:16px;
padding:20px;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

h2{
margin-top:0;
}

.row{
display:flex;
gap:10px;
align-items:center;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
text-align:center;
font-size:16px;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
font-size:16px;
cursor:pointer;
touch-action: manipulation;
}

button:active{
transform:scale(0.95);
}

.small{
font-size:12px;
opacity:0.7;
}

.result{
background:#f1f5f9;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.pack{
margin-bottom:15px;
}

.limit{
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>⏳ Remaining Time</h2>

<div class="row">
<button onmousedown="hold(this, 'hours', -1)" onmouseup="stop()">-</button>
<input id="hours" value="24">
<button onmousedown="hold(this, 'hours', 1)" onmouseup="stop()">+</button>

<span>Hours</span>
</div>

<div class="row">
<button onmousedown="hold(this, 'minutes', -1)" onmouseup="stop()">-</button>
<input id="minutes" value="0">
<button onmousedown="hold(this, 'minutes', 1)" onmouseup="stop()">+</button>

<span>Minutes</span>
</div>

<div class="result" id="timeResult"></div>
</div>

<div class="card">
<h2>⚡ Player Setup</h2>

<input id="currentStroll" placeholder="Current Stroll Point" value="0">
<br><br>
<input id="currentStamp" placeholder="Current Stamp Point" value="0">
<br><br>
<input id="fellows" placeholder="Operating Fellows (optional)" value="0">
</div>

<div class="card">
<h2>🍡 Sakuramochi</h2>

<input id="mochi" value="0">

<div class="result" id="mochiResult"></div>
</div>

<div class="card">
<h2>💎 Crystal Packs</h2>

<div id="packInfo"></div>

<div class="pack">
199 Pack
<input id="p199" value="0">
<div class="limit" id="l199"></div>
</div>

<div class="pack">
988 Pack
<input id="p988" value="0">
<div class="limit" id="l988"></div>
</div>

<div class="pack">
1988 Pack
<input id="p1988" value="0">
<div class="limit" id="l1988"></div>
</div>

</div>

<div class="card">
<h2>🎯 Target Score</h2>

<input id="target" value="7500">

<div class="result" id="targetResult"></div>
</div>

</div>

<script>

let interval;

function hold(btn, id, delta){
change(id, delta)
interval = setInterval(()=>change(id, delta),150)
}

function stop(){
clearInterval(interval)
}

function change(id, delta){
let el = document.getElementById(id)
let val = parseInt(el.value)||0
val += delta
if(val<0) val=0
el.value = val
update()
}

function get(id){
return parseInt(document.getElementById(id).value)||0
}

function update(){

let h = get("hours")
let m = get("minutes")

let totalHours = h + m/60
let days = Math.ceil(totalHours/24)

let maxPack = days * 3

document.getElementById("l199").innerText = "Max: "+maxPack
document.getElementById("l988").innerText = "Max: "+maxPack
document.getElementById("l1988").innerText = "Max: "+maxPack

document.getElementById("timeResult").innerHTML =
"Estimated Buy Days: "+days

// Mochi
let mochi = get("mochi")
let stamina = mochi * 5
let stamp = stamina * 200

document.getElementById("mochiResult").innerHTML =
"+ "+stamina+" Stroll<br>+ "+stamp+" Stamp Point"

// Target
let current = get("currentStamp")
let target = get("target")

let need = target - current
if(need<0) need=0

let strollNeed = Math.ceil(need/200)

document.getElementById("targetResult").innerHTML =
"Need: "+need+" Stamp Point<br>≈ "+strollNeed+" Stroll"

}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input", update)
})

update()

</script>

</body>
</html>
