<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
body{
font-family:Segoe UI;
margin:0;
background:#eef2ff;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
}

.card{
background:white;
border-radius:14px;
padding:15px;
margin-bottom:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

h2{
margin:0 0 10px 0;
}

.big{
font-size:32px;
text-align:center;
font-weight:bold;
}

.row{
display:flex;
gap:5px;
margin-bottom:8px;
}

input{
flex:1;
padding:10px;
text-align:center;
font-size:16px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
touch-action:manipulation;
}

.progress{
height:10px;
background:#ddd;
border-radius:5px;
overflow:hidden;
}

.bar{
height:100%;
background:#22c55e;
width:0%;
}
</style>
</head>

<body>

<div class="container">

<!-- RESULT -->
<div class="card">
<h2>🪙 Your Coin</h2>
<div class="big" id="coin">0</div>

<div class="progress"><div class="bar" id="bar"></div></div>
<div id="progressText" style="text-align:center;"></div>
</div>

<!-- STEP 1 -->
<div class="card">
<h2>① Your Resources</h2>

Stamina
<input id="stamina">

Stamp
<input id="stamp">

Time (min)
<input id="time">

Mochi
<input id="mochi">

Pack
<input id="pack">
</div>

<!-- STEP 2 -->
<div class="card">
<h2>② Conversion</h2>

<div id="flow"></div>

</div>

<!-- STEP 3 -->
<div class="card">
<h2>③ Target</h2>

Target Coin
<input id="target">

<div id="need"></div>

</div>

</div>

<script>

function get(id){return parseInt(document.getElementById(id).value)||0}

function update(){

let stamina=get("stamina")
let stamp=get("stamp")
let time=get("time")
let mochi=get("mochi")
let pack=get("pack")

let regen=Math.floor(time/20)
let mochiSta=mochi*5
let packSta=pack*30

let totalSta=stamina+regen+mochiSta+packSta
let totalStamp=stamp+totalSta*200

let coin=Math.floor(totalStamp/200000)*10

let target=get("target")

coinEl.innerText=coin

flow.innerHTML=
totalSta+" stamina → "+totalStamp+" stamp → "+coin+" coin"

let percent=target?coin/target*100:0
if(percent>100)percent=100

bar.style.width=percent+"%"
progressText.innerText=coin+" / "+target

let need=target-coin
if(need<0)need=0

needEl.innerText="Need "+need+" coin"

}

let coinEl=document.getElementById("coin")
let flow=document.getElementById("flow")
let bar=document.getElementById("bar")
let progressText=document.getElementById("progressText")
let needEl=document.getElementById("need")

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",update)
})

update()

</script>

</body>
</html>
