<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Touno Island Calculator</title>

<style>
*{box-sizing:border-box;font-family:Segoe UI;}
body{margin:0;background:#eef2ff;}
.container{max-width:1000px;margin:auto;padding:15px;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:white;
border-radius:14px;
padding:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

h3{margin:0 0 10px 0;}

label{font-size:13px;opacity:.7;}

.row{display:flex;gap:5px;margin-bottom:8px;}

input{
flex:1;
padding:8px;
border-radius:8px;
border:1px solid #ccc;
text-align:center;
}

button{
padding:6px 10px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
cursor:pointer;
touch-action: manipulation;
}

.secondary{background:#64748b;}

.result{
background:#f1f5f9;
padding:10px;
border-radius:8px;
margin-top:8px;
font-size:14px;
}

.big{
font-size:22px;
font-weight:bold;
}

.progress{
height:12px;
background:#e5e7eb;
border-radius:6px;
overflow:hidden;
margin-top:8px;
}

.bar{
height:100%;
background:#22c55e;
width:0%;
}

.small{font-size:12px;opacity:.7;}

.actions{display:flex;gap:10px;margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<div class="grid">

<!-- TIME -->
<div class="card">
<h3>⏳ Remaining Time</h3>

<label>Hours</label>
<div class="row">
<button onmousedown="hold('h',-1)" onmouseup="stop()">-</button>
<input id="h">
<button onmousedown="hold('h',1)" onmouseup="stop()">+</button>
</div>

<label>Minutes</label>
<div class="row">
<button onmousedown="hold('m',-1)" onmouseup="stop()">-</button>
<input id="m">
<button onmousedown="hold('m',1)" onmouseup="stop()">+</button>
</div>

<div class="result" id="timeBox"></div>

<div class="small">
* Stamina regenerates every 20 minutes<br>
* Last stamina may not be usable<br>
* Subtracts 1 stamina to avoid overestimate
</div>
</div>

<!-- PLAYER -->
<div class="card">
<h3>⚡ Player Setup</h3>

<label>Current Stamp Point</label>
<input id="stamp">

<label>Current Stamina</label>
<input id="stamina">
</div>

<!-- MOCHI -->
<div class="card">
<h3>🍡 Sakuramochi in Storage</h3>

<div class="row">
<button onmousedown="hold('mochi',-1)" onmouseup="stop()">-</button>
<input id="mochi">
<button onmousedown="hold('mochi',1)" onmouseup="stop()">+</button>
</div>

<div class="result" id="mochiBox"></div>
</div>

<!-- TARGET -->
<div class="card">
<h3>🎯 Target Sakura Coin</h3>
<input id="target">
<div class="result" id="targetBox"></div>
</div>

</div>

<!-- PACK -->
<div class="card">
<h3>💎 Crystal Packs</h3>

<div class="row">
199 Pack (6 Sakuramochi)
<button onmousedown="hold('p1',-1,true)" onmouseup="stop()">-</button>
<input id="p1">
<button onmousedown="hold('p1',1,true)" onmouseup="stop()">+</button>
</div>

<div class="row">
988 Pack (12 Sakuramochi)
<button onmousedown="hold('p2',-1,true)" onmouseup="stop()">-</button>
<input id="p2">
<button onmousedown="hold('p2',1,true)" onmouseup="stop()">+</button>
</div>

<div class="row">
1988 Pack (18 Sakuramochi)
<button onmousedown="hold('p3',-1,true)" onmouseup="stop()">-</button>
<input id="p3">
<button onmousedown="hold('p3',1,true)" onmouseup="stop()">+</button>
</div>

<div class="result big" id="coinBox"></div>

<div class="progress"><div class="bar" id="bar"></div></div>

<div class="result" id="detailBox"></div>

<div class="actions">
<button onclick="copy()">Copy Result</button>
<button class="secondary" onclick="resetAll()">Reset</button>
</div>

</div>

</div>

<script>

let keys=["h","m","stamp","stamina","mochi","target","p1","p2","p3"]

keys.forEach(k=>{
let v=localStorage.getItem(k)
if(v!==null) document.getElementById(k).value=v
})

function save(){
keys.forEach(k=>{
localStorage.setItem(k,document.getElementById(k).value)
})
}

let t

function hold(id,d,isPack){
change(id,d,isPack)
t=setInterval(()=>change(id,d,isPack),120)
}
function stop(){clearInterval(t)}

function get(id){return parseInt(document.getElementById(id).value)||0}

function maxPack(){
let h=get("h"),m=get("m")
return Math.ceil((h+m/60)/24)*3
}

function change(id,d,isPack){
let v=get(id)+d
if(v<0)v=0
if(isPack){
let max=maxPack()
if(v>max)v=max
}
document.getElementById(id).value=v
update()
}

function update(){

save()

let h=get("h"),m=get("m")
let totalMin=h*60+m
let regen=Math.floor(totalMin/20)-1
if(regen<0)regen=0

timeBox.innerHTML=
"Remaining Minutes: "+totalMin+"<br>"+
"Regenerate Stamina: "+regen

// Mochi
let mochi=get("mochi")
let mochiSta=mochi*5
mochiBox.innerHTML="+ "+mochiSta+" Stamina"

// Pack
let packMochi=get("p1")*6+get("p2")*12+get("p3")*18
let packSta=packMochi*5

// Total
let totalSta=get("stamina")+regen+mochiSta+packSta
let totalStamp=get("stamp")+(totalSta*200)

// Exchange
let exchange=Math.floor(totalStamp/200000)
let coin=exchange*10
let remain=totalStamp%200000

// Next
let needStamp=200000-remain
let needSta=Math.ceil(needStamp/200)

// Target
let target=get("target")
let needCoin=target-coin
if(needCoin<0)needCoin=0

// UI
coinBox.innerHTML="Sakura Coin: "+coin

detailBox.innerHTML=
"Total Stamina: "+totalSta+"<br>"+
"Total Stamp Point: "+totalStamp+"<br><br>"+

"Exchange Count: "+exchange+"<br>"+
"Remaining Stamp Point: "+remain+"<br><br>"+

"Next Exchange Need:<br>"+
needStamp+" Stamp Point (~"+needSta+" Stamina)<br><br>"+

"Target: "+target+" Sakura Coin<br>"+
"Need: "+needCoin+" Sakura Coin"

// progress
let percent= target>0 ? (coin/target)*100 : 0
if(percent>100)percent=100
bar.style.width=percent+"%"

}

function copy(){
let text=detailBox.innerText
navigator.clipboard.writeText(text)
alert("Copied")
}

function resetAll(){
localStorage.clear()
location.reload()
}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",update)
})

update()

</script>

</body>
</html>
