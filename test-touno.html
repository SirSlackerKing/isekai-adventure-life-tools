<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Touno Island Calculator</title>

<style>
*{
box-sizing:border-box;
font-family:Segoe UI, system-ui, -apple-system;
}

body{
margin:0;
background:#eef2ff;
color:#111;
}

.container{
max-width:720px;
margin:auto;
padding:12px;
}

.header{
text-align:center;
margin-bottom:14px;
}

.home{
font-size:14px;
display:inline-block;
margin-bottom:6px;
cursor:pointer;
color:#6366f1;
}

h2{
margin:0 0 12px 0;
font-size:20px;
}

.card{
background:white;
border-radius:16px;
padding:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:14px;
}

.small{
font-size:12px;
opacity:.65;
line-height:1.5;
}

.big{
font-size:28px;
font-weight:bold;
text-align:center;
margin:14px 0;
}

label{
display:block;
font-size:13px;
margin:10px 0 6px;
opacity:.8;
}

input{
width:100%;
padding:12px;
font-size:16px;
border-radius:12px;
border:1px solid #d1d5db;
text-align:center;
background:#fff;
}

.input-icon{
display:flex;
align-items:center;
gap:10px;
background:#f8fafc;
border-radius:14px;
padding:6px 10px;
border:1px solid #e5e7eb;
}

.input-icon img{
width:26px;
height:26px;
border-radius:8px;
}

.input-icon input{
border:none;
background:transparent;
text-align:left;
padding:10px 6px;
font-size:15px;
}

.input-icon input:focus{
outline:none;
}

.row{
display:flex;
align-items:center;
gap:8px;
margin-bottom:10px;
}

.row input{
flex:1;
}

.time-row{
display:flex;
align-items:center;
gap:8px;
}

.time-box{
display:flex;
align-items:center;
gap:6px;
background:#f8fafc;
padding:6px;
border-radius:12px;
border:1px solid #e5e7eb;
}

.time-box input{
width:60px;
padding:8px;
font-size:14px;
}

.time-label{
font-size:12px;
opacity:.7;
margin-left:4px;
}

button{
min-width:40px;
height:40px;
padding:0 10px;
font-size:16px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
cursor:pointer;
touch-action:manipulation;
}

button:active{
transform:scale(0.96);
}

/* RESULT */
.result{
background:#f8fafc;
padding:12px;
border-radius:12px;
margin-top:10px;
font-size:14px;
line-height:1.5;
}

/* ✅ ปรับ icon */
.result-icon{
width:42px;
height:42px;
border-radius:14px;
background:#f1f5f9;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}

.result-icon img{
width:26px;
height:26px;
border-radius:8px;
}

.result-row{
display:flex;
gap:10px;
align-items:flex-start;
}

.result-content{
flex:1;
}

.actions{
display:flex;
gap:10px;
margin-top:8px;
}

.actions button{
flex:1;
font-size:15px;
}

hr{
border:none;
border-top:1px solid #eee;
margin:14px 0;
}

/* ✅ FIX B ไม่ตก */
.input-suffix{
display:flex;
align-items:center;
background:#f8fafc;
border:1px solid #e5e7eb;
border-radius:14px;
padding:6px 10px;
}

.input-suffix input{
border:none;
background:transparent;
flex:1;
padding:10px 6px;
font-size:15px;
text-align:left;
min-width:0;
}

.input-suffix span{
font-size:13px;
opacity:.6;
white-space:nowrap;
}

.input-suffix input:focus{
outline:none;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="home">← Home</div>
<h2>Touno Island Calculator</h2>
<div class="small">Dev by @thinking.j17 | cozyneko guild S12</div>
</div>

<!-- (โค้ดส่วนอื่นเหมือนเดิมทั้งหมด) -->

<!-- KAGURA -->
<div class="card">
<h2>💃 Kagura Dance Calculator</h2>

<div class="small">Calculate your faith from coin</div>

<label>Base Power</label>
<div class="input-suffix">
<input id="base" type="number" step="0.01">
<span>B</span>
</div>

<label>Sakura Coin (use)</label>
<input id="useCoin">

<div class="result" id="kaguraBox"></div>

<hr>

<div class="small">Want to know how many coins you need for this faith?</div>

<label>Target Faith</label>
<div class="input-suffix">
<input id="targetPower" type="number" step="0.01">
<span>B</span>
</div>

<div class="result" id="kaguraNeedBox"></div>
</div>

<script>

/* ✅ เพิ่ม format */
function fmt(n){
return Number(n).toLocaleString("en-US")
}

/* ✅ เปลี่ยน get เป็น float */
function get(id){
return parseFloat(document.getElementById(id).value)||0
}

/* === JS เดิมทั้งหมด === */

let keys=["h","m","coinNow","usedSta","stamp","rate","mochi","p1","p2","p3","base","useCoin","targetPower"]

keys.forEach(k=>{
let v=localStorage.getItem(k)
if(v!==null) document.getElementById(k).value=v
})

function save(){
keys.forEach(k=>{
localStorage.setItem(k,document.getElementById(k).value)
})
}

let t
function hold(id,d,isPack){
change(id,d,isPack)
t=setInterval(()=>change(id,d,isPack),120)
}
function stop(){clearInterval(t)}

function maxPack(){
let h=get("h"),m=get("m")
let days=Math.ceil((h+m/60)/24)
return days*3
}

function change(id,d,isPack){
let v=get(id)+d
if(v<0)v=0
if(isPack){
let max=maxPack()
if(v>max)v=max
}
document.getElementById(id).value=v
update()
}

function update(){

save()

let totalMin=get("h")*60+get("m")
let regen=Math.floor(totalMin/20)-1
if(regen<0)regen=0

timeBox.innerHTML=
"Remaining Minutes: "+fmt(totalMin)+"<br>"+
"Regen Stamina: "+fmt(regen)

packLimitBox.innerHTML="Max per type: "+fmt(maxPack())

let mochiSta=get("mochi")*5
let packSta=(get("p1")*6+get("p2")*12+get("p3")*18)*5
let totalNewSta=mochiSta+packSta+regen

let newStampFromSta=totalNewSta*200
let fellowStamp=get("rate")*totalMin
let totalStamp=get("stamp")+newStampFromSta+fellowStamp

let newCoin=Math.floor(totalStamp/200000)*10
let totalCoin=get("coinNow")+newCoin

resourceBox.innerHTML=
"Stroll & Stamina from Sakuramochi: "+fmt(mochiSta)+"<br>"+
"Stroll & Stamina from Packs: "+fmt(packSta)+"<br>"+
"Stroll & Stamina from Regen: "+fmt(regen)+"<br><br>"+
"Total New Stroll & Stamina: "+fmt(totalNewSta)

stampBox.innerHTML=
"Stamp Point from Stamina: "+fmt(newStampFromSta)+"<br>"+
"Stamp Point from Operation Fellows: "+fmt(fellowStamp)+"<br><br>"+
"Total Stamp Point: "+fmt(totalStamp)

coinBox.innerHTML=
"New Sakura Coin: "+fmt(newCoin)+"<br>"+
"Total Sakura Coin: "+fmt(totalCoin)

/* KAGURA FIX */
let base=get("base")
let coin=get("useCoin")
let score=base*coin

kaguraBox.innerHTML=
fmt(base)+" B × "+fmt(coin)+" Coin = <b>"+formatBT(score)+"</b>"

let needCoin=0
if(get("targetPower")>0 && base>0){
needCoin=Math.ceil(get("targetPower")/base)
}

kaguraNeedBox.innerHTML="Needed Sakura Coin: "+fmt(needCoin)

}

function copy(){
let text=
resourceBox.innerText+"\n\n"+
stampBox.innerText+"\n\n"+
coinBox.innerText

navigator.clipboard.writeText(text)
alert("Copied")
}

function resetAll(){
localStorage.clear()
location.reload()
}

function formatBT(value){
if(value >= 1000){
return (value/1000).toFixed(3).replace(/\.?0+$/,"") + "T"
}else{
return value.toFixed(2).replace(/\.?0+$/,"") + "B"
}
}
  
document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",update)
})

update()

</script>

</body>
</html>
