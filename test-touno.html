<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Touno Island Calculator</title>

<style>
*{
box-sizing:border-box;
font-family:Segoe UI, system-ui, -apple-system;
}

body{
margin:0;
background:#eef2ff;
color:#111;
}

.container{
max-width:720px;
margin:auto;
padding:12px;
}

.header{
text-align:center;
margin-bottom:14px;
}

.home{
font-size:14px;
display:inline-block;
margin-bottom:6px;
cursor:pointer;
color:#6366f1;
}

h2{
margin:0 0 12px 0;
font-size:20px;
}

.card{
background:white;
border-radius:16px;
padding:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:14px;
}

.small{
font-size:12px;
opacity:.65;
line-height:1.5;
}

.big{
font-size:28px;
font-weight:bold;
text-align:center;
margin:14px 0;
}

label{
display:block;
font-size:13px;
margin:10px 0 6px;
opacity:.8;
}

input{
width:100%;
padding:12px;
font-size:16px;
border-radius:12px;
border:1px solid #d1d5db;
text-align:center;
background:#fff;
}

.input-icon{
display:flex;
align-items:center;
gap:10px;
background:#f8fafc;
border-radius:14px;
padding:6px 10px;
border:1px solid #e5e7eb;
}

.input-icon img{
width:26px;
height:26px;
border-radius:8px;
}

.input-icon input{
border:none;
background:transparent;
text-align:left;
padding:10px 6px;
font-size:15px;
}

.input-icon input:focus{
outline:none;
}

.row{
display:flex;
align-items:center;
gap:8px;
margin-bottom:10px;
}

.row input{
flex:1;
}

.time-row{
display:flex;
align-items:center;
gap:8px;
}

.time-box{
display:flex;
align-items:center;
gap:6px;
background:#f8fafc;
padding:6px;
border-radius:12px;
border:1px solid #e5e7eb;
}

.time-box input{
width:60px;
padding:8px;
font-size:14px;
}

.time-label{
font-size:12px;
opacity:.7;
margin-left:4px;
}

button{
min-width:40px;
height:40px;
padding:0 10px;
font-size:16px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
cursor:pointer;
}

button:active{
transform:scale(0.96);
}

/* RESULT */
.result{
background:#f8fafc;
padding:12px;
border-radius:14px;
margin-top:10px;
font-size:14px;
line-height:1.5;
}

/* 🔥 FIX ICON SIZE + ROUND */
.result-icon{
width:42px;
height:42px;
border-radius:14px;
background:#f1f5f9;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}

.result-icon img{
width:26px;
height:26px;
border-radius:8px;
}

.result-row{
display:flex;
gap:10px;
align-items:flex-start;
}

.result-content{
flex:1;
}

.actions{
display:flex;
gap:10px;
margin-top:8px;
}

.actions button{
flex:1;
font-size:15px;
}

hr{
border:none;
border-top:1px solid #eee;
margin:14px 0;
}

/* 🔥 FIX B SUFFIX */
.input-suffix{
display:flex;
align-items:center;
background:#f8fafc;
border:1px solid #e5e7eb;
border-radius:14px;
padding:6px 10px;
}

.input-suffix input{
border:none;
background:transparent;
flex:1;
padding:10px 6px;
font-size:15px;
text-align:left;
min-width:0;
}

.input-suffix span{
font-size:13px;
opacity:.6;
white-space:nowrap;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="home">← Home</div>
<h2>Touno Island Calculator</h2>
<div class="small">Dev by @thinking.j17 | cozyneko guild S12</div>
</div>

<!-- RESULT -->
<div class="card">
<h2>📊 Result</h2>

<div class="result">
<div class="result-row">
<div class="result-icon">
<img src="images/strollpoint.png">
</div>
<div class="result-content" id="resourceBox"></div>
</div>
</div>

<div class="result">
<div class="result-row">
<div class="result-icon">
<img src="images/ranking-icon.png">
</div>
<div class="result-content" id="stampBox"></div>
</div>
</div>

<div class="big" id="coinBox"></div>
</div>

<!-- KAGURA -->
<div class="card">
<h2>💃 Kagura Dance Calculator</h2>

<label>Base Power</label>
<div class="input-suffix">
<input id="base" type="number" step="0.01">
<span>B</span>
</div>

<label>Sakura Coin (use)</label>
<input id="useCoin" type="number">

<div class="result" id="kaguraBox"></div>

<hr>

<label>Target Faith</label>
<div class="input-suffix">
<input id="targetPower" type="number" step="0.01">
<span>B</span>
</div>

<div class="result" id="kaguraNeedBox"></div>
</div>

</div>

<script>

/* 🔥 FIX parseFloat */
function getFloat(id){
return parseFloat(document.getElementById(id).value) || 0
}

/* 🔥 FORMAT COMMA */
function fmt(n){
return n.toLocaleString("en-US")
}

function formatBT(value){
if(value >= 1000){
return (value/1000).toFixed(3).replace(/\.?0+$/,"") + "T"
}else{
return value.toFixed(2).replace(/\.?0+$/,"") + "B"
}
}

function update(){

let base=getFloat("base")
let coin=getFloat("useCoin")

let score=base*coin

document.getElementById("kaguraBox").innerHTML=
fmt(base)+" B × "+fmt(coin)+" Coin = <b>"+formatBT(score)+"</b>"

/* 🔥 FIX TARGET */
let target=getFloat("targetPower")
let needCoin=0

if(target>0 && base>0){
needCoin=Math.ceil(target/base)
}

document.getElementById("kaguraNeedBox").innerHTML=
"Needed Sakura Coin: "+fmt(needCoin)

}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",update)
})

update()

</script>

</body>
</html>
