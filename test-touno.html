<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Touno Island Tools</title>

<style>
*{box-sizing:border-box;font-family:Segoe UI;}
body{margin:0;background:#0f172a;color:#fff;display:flex;justify-content:center;}
.container{width:100%;max-width:900px;padding:16px;}
.card{
background:#1e293b;
border-radius:16px;
padding:16px;
margin-bottom:16px;
box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
h2{margin-top:0;}
input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:none;
outline:none;
}
.row{display:flex;gap:10px;}
.row input{flex:1;}
button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}
.btn{background:#38bdf8;color:black;width:100%;}
.result{
background:#020617;
padding:12px;
border-radius:10px;
margin-top:10px;
white-space:pre-line;
}
.small{font-size:12px;color:#94a3b8;margin-top:8px;}
</style>
</head>

<body>
<div class="container">

<!-- TIME -->
<div class="card">
<h2>⏳ Time</h2>
<div class="row">
<input id="days" type="number" placeholder="Days">
<input id="hours" type="number" placeholder="Hours">
<input id="minutes" type="number" placeholder="Minutes">
</div>
</div>

<!-- PROGRESS -->
<div class="card">
<h2>📊 Current Progress</h2>
<input id="progress" type="number" placeholder="Stroll + Stamina (points)">
</div>

<!-- SPEED -->
<div class="card">
<h2>⚡ Operating Fellows</h2>
<input id="speed" type="number" placeholder="Points per minute">
</div>

<!-- STAMINA -->
<div class="card">
<h2>🚶 Stamina Usage</h2>
<input id="stamina" type="number" placeholder="Total Stamina">
<input id="cost" type="number" placeholder="Stamina per stroll (default 10)">
</div>

<!-- PACK -->
<div class="card">
<h2>🎁 Pack</h2>

<div class="row">
<input id="p199" type="number" value="0">
<input id="p988" type="number" value="0">
<input id="p1988" type="number" value="0">
</div>

<div class="small">
* Each pack can be purchased 3 times per day<br>
* Purchase limit increases based on remaining time<br>
* 199 = 6 Mochi | 988 = 12 Mochi | 1988 = 18 Mochi
</div>
</div>

<button class="btn" onclick="calculate()">Calculate</button>

<div id="output" class="result"></div>

</div>

<script>
function get(id){
return parseFloat(document.getElementById(id).value)||0
}

// auto calculate ตอนพิมพ์
document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",calculate)
})

function calculate(){

// TIME
let days=get("days")
let hours=get("hours")
let minutes=get("minutes")

let totalMinutes = days*1440 + hours*60 + minutes

// SPEED (AFK)
let speed=get("speed")
let pointsFromSpeed = speed * totalMinutes

// STAMINA → STROLL
let stamina=get("stamina")
let cost=get("cost") || 10

let strolls = Math.floor(stamina / cost)
let pointsFromStroll = strolls * 200

// CURRENT PROGRESS
let progress=get("progress")

// TOTAL POINTS
let totalPoints = pointsFromSpeed + pointsFromStroll + progress

// COIN
let coins = Math.floor(totalPoints / 200000) * 10

let remainder = totalPoints % 200000
let need = 200000 - remainder
if(remainder===0) need = 0

// POINTS / DAY
let pointsPerDay = speed * 1440

// PACK MOCHI
let p199=get("p199")
let p988=get("p988")
let p1988=get("p1988")

let totalMochi = p199*6 + p988*12 + p1988*18

// OUTPUT
let text = `
⏳ Total Minutes: ${totalMinutes.toLocaleString()}

📊 Current Progress: ${progress.toLocaleString()}

⚡ From Operating Fellows: ${Math.floor(pointsFromSpeed).toLocaleString()}
🚶 From Stamina: ${pointsFromStroll.toLocaleString()} (${strolls.toLocaleString()} strolls)

📅 Points per day (AFK): ${Math.floor(pointsPerDay).toLocaleString()}

🎯 Total Points: ${Math.floor(totalPoints).toLocaleString()}

🪙 Sakura Coin: ${coins}

📈 Points to next 10 coins: ${need.toLocaleString()}

🎁 Total Mochi: ${totalMochi}

------------------------
Notes:
- Uses minimum 200 points per stroll
- Each stroll may give 200–250 points
- Assumes you claim regularly
- Random buffs (extra stamina / points) are NOT included
- Actual result may be higher
`

document.getElementById("output").innerText=text
}

// run ครั้งแรก
calculate()
</script>

</body>
</html>
