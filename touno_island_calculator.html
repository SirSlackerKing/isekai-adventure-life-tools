<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Touno Island Calculator</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{
margin:0;
background:#eef2ff;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:900px;
padding:20px;
}

h1{
text-align:center;
}

.card{
background:white;
padding:18px;
border-radius:10px;
margin-bottom:18px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

input{
width:100%;
padding:8px;
margin-top:4px;
}

.result{
background:#f3f4f6;
padding:10px;
border-radius:6px;
margin-top:10px;
}

.progress{
width:100%;
height:18px;
background:#e5e7eb;
border-radius:8px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
background:#6366f1;
width:0%;
}

@media(max-width:600px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Touno Island Calculator</h1>


<div class="card">

<h2>Remaining Time</h2>

<div class="grid">

<div>
Days
<input type="number" id="days" value="0">
</div>

<div>
Hours
<input type="number" id="hours" value="0">
</div>

<div>
Minutes
<input type="number" id="minutes" value="0">
</div>

</div>

<div class="result" id="timeResult"></div>

</div>


<div class="card">

<h2>Progress Predictor</h2>

<label>Current Stroll</label>
<input type="number" id="stroll" value="0">

<label>Current Stamina</label>
<input type="number" id="stamina" value="0">

<label>Sakuramochi</label>
<input type="number" id="mochi" value="0">

<label>Target Reward</label>
<input type="number" id="target" value="7500">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="result" id="progressResult"></div>

</div>


<div class="card">

<h2>Crystal Pack Planner</h2>

<label>199 Crystal Pack Purchases per Day (0-3)</label>
<input type="number" id="pack199" value="0">

<div class="result" id="crystalResult"></div>

</div>


<div class="card">

<h2>Kagura Calculator</h2>

<label>Fellow Power</label>
<input type="number" id="power" value="1000000">

<label>Support Bonus %</label>
<input type="number" id="bonus" value="0">

<label>Sakura Coins</label>
<input type="number" id="coins" value="1">

<div class="result" id="kaguraResult"></div>

</div>


</div>


<script>

function getRemainingMinutes(){

let d = Number(days.value)
let h = Number(hours.value)
let m = Number(minutes.value)

return d*1440 + h*60 + m

}

function getRegen(){

let minutes = getRemainingMinutes()

let regen = Math.floor(minutes/20) - 1

if(regen<0) regen=0

return regen

}

function calcProgress(){

let stroll = Number(strollInput.value)
let stamina = Number(staminaInput.value)
let mochi = Number(mochiInput.value)

let regen = getRegen()

let totalStamina =
stamina + regen + mochi*5

let finalStroll =
stroll + totalStamina

let target = Number(targetInput.value)

let percent = Math.min((finalStroll/target)*100,100)

bar.style.width = percent+"%"

progressResult.innerHTML=

"Regen Stamina: "+regen+"<br>"+
"Total Stamina: "+totalStamina+"<br>"+
"Predicted Final Stroll: "+finalStroll

}

function calcCrystal(){

let buy = Number(pack199Input.value)

let daily=0

if(buy==1) daily=9
if(buy==2) daily=27
if(buy>=3) daily=54

let days = Math.ceil(getRemainingMinutes()/1440)

let mochi = daily * days
let stamina = mochi*5
let crystals = buy*199*days

crystalResult.innerHTML=

"Days Remaining: "+days+"<br>"+
"Total Mochi: "+mochi+"<br>"+
"Total Stamina: "+stamina+"<br>"+
"Total Crystals: "+crystals

}

function calcKagura(){

let power = Number(powerInput.value)
let bonus = Number(bonusInput.value)
let coins = Number(coinsInput.value)

let faith = power*(1+bonus/100)*coins/1000

kaguraResult.innerHTML=

"Faith Gained: "+Math.floor(faith)+"<br>"+
"Faith per Coin: "+Math.floor(faith/coins)

}

function calcTime(){

let minutes = getRemainingMinutes()
let regen = getRegen()

timeResult.innerHTML=

"Remaining Minutes: "+minutes+
"<br>Regen Stamina: "+regen

}

function calculateAll(){

calcTime()
calcProgress()
calcCrystal()
calcKagura()

}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",calculateAll)
})

const strollInput=document.getElementById("stroll")
const staminaInput=document.getElementById("stamina")
const mochiInput=document.getElementById("mochi")
const targetInput=document.getElementById("target")

const pack199Input=document.getElementById("pack199")

const powerInput=document.getElementById("power")
const bonusInput=document.getElementById("bonus")
const coinsInput=document.getElementById("coins")

const progressResult=document.getElementById("progressResult")
const crystalResult=document.getElementById("crystalResult")
const kaguraResult=document.getElementById("kaguraResult")
const timeResult=document.getElementById("timeResult")
const bar=document.getElementById("bar")

calculateAll()

</script>

</body>
</html>
