<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Touno Island Calculator</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{
margin:0;
background:#eef2ff;
display:flex;
justify-content:center;
}

.container{
width:900px;
padding:20px;
}

h1{
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:8px;
margin:6px 0 12px 0;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
background:#6366f1;
color:white;
cursor:pointer;
margin-right:6px;
}

.result{
margin-top:12px;
padding:10px;
background:#f3f4f6;
border-radius:6px;
}

.note{
font-size:13px;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<h1>Touno Island Calculator</h1>

<div class="card">

<h2>Event Setup</h2>

<label>Event Start Date</label>
<input type="datetime-local" id="start">

<label>Event Duration</label>
<select id="duration">
<option value="1">1 Day</option>
<option value="2">2 Days</option>
<option value="3">3 Days</option>
<option value="4">4 Days</option>
<option value="5">5 Days</option>
<option value="6">6 Days</option>
<option value="7">7 Days</option>
</select>

<button onclick="calculateEnd()">Generate End Time</button>

<label>Event End Time</label>
<input type="datetime-local" id="end">

<button onclick="useServerTime()">Use SEA Server Time (Now)</button>

<div class="result" id="timeInfo"></div>

</div>


<div class="card">

<h2>Event Progress Predictor</h2>

<label>Current Stroll</label>
<input type="number" id="stroll" value="0">

<label>Current Stamina</label>
<input type="number" id="stamina" value="0">

<label>Sakuramochi</label>
<input type="number" id="mochi" value="0">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

<p class="note">
*Regen subtracts 1 stamina because the last stamina may regenerate exactly when the event ends and cannot be used.
</p>

</div>


<script>

let serverNow = null


function calculateEnd(){

let start = new Date(document.getElementById("start").value)
let days = parseInt(document.getElementById("duration").value)

if(!start) return

start.setDate(start.getDate()+days)

document.getElementById("end").value =
start.toISOString().slice(0,16)

updateTime()

}


function useServerTime(){

serverNow = new Date()

updateTime()

}


function getNow(){

return serverNow ? serverNow : new Date()

}


function updateTime(){

let end = new Date(document.getElementById("end").value)

if(!end) return

let now = getNow()

let diff = end-now

if(diff<0) diff=0

let minutes = Math.floor(diff/60000)

let days = Math.floor(minutes/1440)
minutes%=1440

let hours = Math.floor(minutes/60)
minutes%=60

document.getElementById("timeInfo").innerHTML =
"Time Remaining: "+
days+"d "+
hours+"h "+
minutes+"m"

}


function getRemainingMinutes(){

let end = new Date(document.getElementById("end").value)

let now = getNow()

if(!end) return 0

let diff = end-now

if(diff<0) return 0

return Math.floor(diff/60000)

}


function getRegen(){

let minutes = getRemainingMinutes()

let regen = Math.floor(minutes/20)-1

if(regen<0) regen=0

return regen

}


function calculate(){

updateTime()

let stroll = parseInt(document.getElementById("stroll").value)||0
let stamina = parseInt(document.getElementById("stamina").value)||0
let mochi = parseInt(document.getElementById("mochi").value)||0

let regen = getRegen()

let totalStamina = stamina + regen + (mochi*5)

let finalStroll = stroll + totalStamina

let text=""

text+="Regen Stamina: "+regen+"<br>"
text+="Total Stamina Available: "+totalStamina+"<br>"
text+="Predicted Final Stroll: "+finalStroll+"<br><br>"

text+="Reward Prediction<br>"

text+=(finalStroll>=150?"✔":"❌")+" 150<br>"
text+=(finalStroll>=1000?"✔":"❌")+" 1000<br>"
text+=(finalStroll>=7500?"✔":"❌")+" 7500<br>"
text+=(finalStroll>=15000?"✔":"❌")+" 15000<br>"

document.getElementById("result").innerHTML=text

}

</script>

</body>
</html>
