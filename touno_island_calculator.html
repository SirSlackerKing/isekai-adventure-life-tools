<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Touno Island Calculator</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{
margin:0;
background:#eef2ff;
display:flex;
justify-content:center;
}

.container{
width:900px;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.home{
background:#4f46e5;
color:white;
padding:8px 14px;
border-radius:6px;
text-decoration:none;
font-size:14px;
}

h1{
text-align:center;
margin:10px 0 20px 0;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h2{
margin-top:0;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input,select{
width:100%;
padding:8px;
margin-top:4px;
margin-bottom:10px;
}

.result{
margin-top:10px;
padding:10px;
background:#f3f4f6;
border-radius:6px;
}

.bar{
height:16px;
background:#e5e7eb;
border-radius:8px;
overflow:hidden;
margin-top:6px;
}

.fill{
height:100%;
background:#6366f1;
width:0%;
}

.note{
font-size:12px;
color:#555;
}

@media(max-width:700px){

.container{
width:100%;
padding:12px;
}

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<a class="home" href="./">🏠 Home</a>
</div>

<h1>Touno Island Calculator</h1>


<div class="card">

<h2>Event Setup</h2>

<div class="grid">

<div>
<label>Start Date</label>
<input type="date" id="startDate">
</div>

<div>
<label>Duration</label>
<select id="duration">
<option value="1">1 Day</option>
<option value="2">2 Days</option>
<option value="3">3 Days</option>
<option value="4">4 Days</option>
<option value="5">5 Days</option>
<option value="6">6 Days</option>
<option value="7">7 Days</option>
</select>
</div>

</div>

<div class="result" id="eventInfo"></div>

<div class="result" id="timeRemaining"></div>

</div>


<div class="card">

<h2>Progress Predictor</h2>

<label>Current Stroll</label>
<input type="number" id="stroll" value="0">

<label>Current Stamina</label>
<input type="number" id="stamina" value="0">

<label>Sakuramochi</label>
<input type="number" id="mochi" value="0">

<label>Target Reward</label>
<input type="number" id="target" value="7500">

<div class="result" id="progressResult"></div>

<div class="bar">
<div class="fill" id="progressBar"></div>
</div>

<p class="note">
*Regen subtracts 1 stamina because the last stamina may regenerate exactly when the event ends and cannot be used.
</p>

</div>


<div class="card">

<h2>Kagura Dance</h2>

<label>Fellow Power</label>
<input type="number" id="power" value="1000000">

<label>Support Bonus (%)</label>
<input type="number" id="bonus" value="0">

<label>Sakura Coins Used</label>
<input type="number" id="coins" value="1">

<div class="result" id="kaguraResult"></div>

</div>


</div>


<script>

function format(dt){

let y=dt.getFullYear()
let m=String(dt.getMonth()+1).padStart(2,"0")
let d=String(dt.getDate()).padStart(2,"0")
let h=String(dt.getHours()).padStart(2,"0")
let min=String(dt.getMinutes()).padStart(2,"0")

return `${y}-${m}-${d} ${h}:${min}`

}


function generateEvent(){

let startDate=document.getElementById("startDate").value
let days=parseInt(document.getElementById("duration").value)

if(!startDate) return

let start=new Date(startDate)

start.setHours(10,0,0,0)

let end=new Date(start)

end.setDate(end.getDate()+days)

end.setHours(22,0,0,0)

document.getElementById("eventInfo").innerHTML=
"Start: "+format(start)+"<br>End: "+format(end)

window.eventStart=start
window.eventEnd=end

}


function remainingMinutes(){

if(!window.eventStart||!window.eventEnd) return 0

let now=new Date()

if(now<eventStart) now=eventStart
if(now>eventEnd) return 0

return Math.floor((eventEnd-now)/60000)

}


function updateTimer(){

if(!window.eventEnd) return

let diff=eventEnd-new Date()

if(diff<0){
document.getElementById("timeRemaining").innerHTML="Event Ended"
return
}

let m=Math.floor(diff/60000)
let d=Math.floor(m/1440)

m%=1440

let h=Math.floor(m/60)

m%=60

document.getElementById("timeRemaining").innerHTML=
"Time Remaining: "+d+"d "+h+"h "+m+"m"

}


function calculateProgress(){

let stroll=parseInt(strollInput.value)||0
let stamina=parseInt(staminaInput.value)||0
let mochi=parseInt(mochiInput.value)||0
let target=parseInt(targetInput.value)||0

let regen=Math.floor(remainingMinutes()/20)-1
if(regen<0) regen=0

let totalStamina=stamina+regen+(mochi*5)

let finalStroll=stroll+totalStamina

let need=target-finalStroll
if(need<0) need=0

let needMochi=Math.ceil(need/5)

progressResult.innerHTML=
"Regen: "+regen+
"<br>Total Stamina: "+totalStamina+
"<br>Final Stroll: "+finalStroll+
"<br>Mochi Needed: "+needMochi

let percent=(finalStroll/target)*100
if(percent>100) percent=100

progressBar.style.width=percent+"%"

}


function kagura(){

let power=parseFloat(powerInput.value)||0
let bonus=parseFloat(bonusInput.value)||0
let coins=parseFloat(coinsInput.value)||0

let base=power*(1+bonus/100)

let faith=base*coins/1000

kaguraResult.innerHTML=
"Faith: "+Math.floor(faith)+
"<br>Faith per Coin: "+Math.floor(faith/coins)

}


setInterval(updateTimer,1000)


startDate.oninput=generateEvent
duration.onchange=generateEvent

strollInput.oninput=calculateProgress
staminaInput.oninput=calculateProgress
mochiInput.oninput=calculateProgress
targetInput.oninput=calculateProgress

powerInput.oninput=kagura
bonusInput.oninput=kagura
coinsInput.oninput=kagura

</script>

</body>
</html>
