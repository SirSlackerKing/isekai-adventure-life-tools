<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Touno Island Calculator</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:linear-gradient(180deg,#eef2ff,#dbeafe);
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:900px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:white;
border-radius:14px;
padding:20px;
margin-bottom:20px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:14px;
}

label{
font-size:13px;
font-weight:600;
color:#444;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #d1d5db;
margin-top:4px;
}

.stepper{
display:flex;
gap:6px;
margin-top:4px;
}

.stepper button{
width:36px;
height:36px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.stepper input{
text-align:center;
}

.progress{
height:12px;
background:#e5e7eb;
border-radius:6px;
margin-top:12px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#6366f1,#22c55e);
}

.result{
background:#f1f5ff;
border-left:4px solid #6366f1;
padding:12px;
border-radius:8px;
margin-top:12px;
font-size:14px;
line-height:1.6;
}

button.action{
background:#6366f1;
border:none;
color:white;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
margin-right:10px;
}

.small{
font-size:13px;
color:#666;
margin-top:8px;
}

</style>
</head>

<body>

<div class="container">

<h1>Touno Island Calculator</h1>

<div class="card">

<h2>Remaining Time</h2>

<div class="grid">

<div>
<label>Days</label>
<div class="stepper">
<button onclick="step('days',-1)">-</button>
<input type="number" id="days" value="0">
<button onclick="step('days',1)">+</button>
</div>
</div>

<div>
<label>Hours</label>
<div class="stepper">
<button onclick="step('hours',-1)">-</button>
<input type="number" id="hours" value="0">
<button onclick="step('hours',1)">+</button>
</div>
</div>

<div>
<label>Minutes</label>
<div class="stepper">
<button onclick="step('minutes',-1)">-</button>
<input type="number" id="minutes" value="0">
<button onclick="step('minutes',1)">+</button>
</div>
</div>

</div>

<div class="result" id="timeResult"></div>

</div>

<div class="card">

<h2>Resources</h2>

<div class="grid">

<div>
<label>Current Score</label>
<input type="number" id="stroll" value="0">
</div>

<div>
<label>Current Stamina</label>
<input type="number" id="stamina" value="0">
</div>

<div>
<label>Sakuramochi</label>
<input type="number" id="mochi" value="0">
</div>

<div>
<label>Target Score</label>
<input type="number" id="target" value="7500">
</div>

</div>

<h3>Crystal Packs</h3>

<div class="grid">

<div>
<label>199 Pack</label>
<div class="stepper">
<button onclick="step('pack199',-1)">-</button>
<input type="number" id="pack199" value="0">
<button onclick="step('pack199',1)">+</button>
</div>
</div>

<div>
<label>988 Pack</label>
<div class="stepper">
<button onclick="step('pack988',-1)">-</button>
<input type="number" id="pack988" value="0">
<button onclick="step('pack988',1)">+</button>
</div>
</div>

<div>
<label>1988 Pack</label>
<div class="stepper">
<button onclick="step('pack1988',-1)">-</button>
<input type="number" id="pack1988" value="0">
<button onclick="step('pack1988',1)">+</button>
</div>
</div>

</div>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<div class="result" id="result"></div>

<br>

<button class="action" onclick="copyResult()">Copy Result</button>
<button class="action" onclick="resetCalc()">Reset</button>

</div>

</div>

<script>

function get(id){
return Number(document.getElementById(id).value)||0
}

function getMinutes(){
return get("days")*1440 + get("hours")*60 + get("minutes")
}

function step(id,amount){

let el=document.getElementById(id)
let value=Number(el.value)||0

value+=amount
if(value<0)value=0

if(id.includes("pack")){
let minutes=getMinutes()
let limit=Math.max(3,Math.ceil(minutes/1440)*3)
if(value>limit)value=limit
}

el.value=value

calculate()
save()

}

function calculate(){

let minutes=getMinutes()

let regen=Math.max(0,Math.floor(minutes/20)-1)

document.getElementById("timeResult").innerHTML=
`Remaining Minutes: <b>${minutes}</b><br>
Regen Stamina: <b>${regen}</b>`

let stroll=get("stroll")
let stamina=get("stamina")
let mochi=get("mochi")
let target=get("target")

if(target<=0) target=1

let p199=get("pack199")
let p988=get("pack988")
let p1988=get("pack1988")

let packMochi=p199*9+p988*18+p1988*27

let totalMochi=mochi+packMochi

let totalStamina=stamina+regen+(totalMochi*5)

let totalStroll=totalStamina

let predictedScore=stroll+(totalStroll*5)

let percent=Math.min((predictedScore/target)*100,100)

document.getElementById("progressBar").style.width=percent+"%"

let text=""

if(predictedScore>=target){

text=`
Total Stamina: <b>${totalStamina}</b><br>
Total Stroll: <b>${totalStroll}</b><br>
Predicted Score: <b>${Math.floor(predictedScore)}</b>
`

}else{

let needScore=target-predictedScore
let needStroll=Math.ceil(needScore/5)
let needMochi=Math.ceil(needStroll/5)

text=`
Predicted Score: <b>${Math.floor(predictedScore)}</b><br><br>
Need <b>${needMochi}</b> Mochi<br>
Need <b>${needStroll}</b> Stroll
`

}

document.getElementById("result").innerHTML=text

}

function save(){

localStorage.setItem("tounoCalc",JSON.stringify({

days:get("days"),
hours:get("hours"),
minutes:get("minutes"),
stroll:get("stroll"),
stamina:get("stamina"),
mochi:get("mochi"),
target:get("target"),
pack199:get("pack199"),
pack988:get("pack988"),
pack1988:get("pack1988")

}))

}

function load(){

let data=localStorage.getItem("tounoCalc")
if(!data)return

data=JSON.parse(data)

for(let key in data){
let el=document.getElementById(key)
if(el) el.value=data[key]
}

}

function resetCalc(){

localStorage.removeItem("tounoCalc")

location.reload()

}

function copyResult(){

navigator.clipboard.writeText(
document.getElementById("result").innerText
)

}

document.querySelectorAll("input").forEach(el=>{
el.addEventListener("input",()=>{
calculate()
save()
})
})

load()
calculate()

</script>

</body>
</html>
