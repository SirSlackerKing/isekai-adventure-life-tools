<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Touno Island Calculator</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{
margin:0;
background:#eef2ff;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:900px;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:white;
padding:18px;
border-radius:10px;
margin-bottom:18px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.stepper{
display:flex;
gap:6px;
align-items:center;
}

.stepper input{
flex:1;
text-align:center;
padding:8px;
}

.stepper button{
width:36px;
height:36px;
font-size:18px;
border:none;
border-radius:6px;
background:#6366f1;
color:white;
font-weight:700;
touch-action:manipulation;
}

.result{
background:#e0e7ff;
border-left:4px solid #6366f1;
padding:12px;
border-radius:6px;
margin-top:10px;
font-weight:600;
}

.subresult{
background:#f8fafc;
padding:10px;
border-radius:6px;
margin-top:10px;
}

.progress{
width:100%;
height:18px;
background:#e5e7eb;
border-radius:8px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
background:#6366f1;
width:0%;
}

button.action{
padding:8px 12px;
border:none;
border-radius:6px;
background:#6366f1;
color:white;
cursor:pointer;
}

.buttons{
margin-top:10px;
display:flex;
gap:10px;
}

.note{
font-size:12px;
margin-top:6px;
color:#555;
}

.footer{
text-align:center;
margin-top:30px;
font-size:13px;
color:#666;
}

@media(max-width:600px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Touno Island Calculator</h1>


<div class="card">

<h2>Remaining Time</h2>

<div class="grid">

<div>

Days

<div class="stepper">

<button onclick="step('days',-1)">-</button>
<input type="number" id="days">
<button onclick="step('days',1)">+</button>

</div>

</div>

<div>

Hours

<div class="stepper">

<button onclick="step('hours',-1)">-</button>
<input type="number" id="hours">
<button onclick="step('hours',1)">+</button>

</div>

</div>

<div>

Minutes

<div class="stepper">

<button onclick="step('minutes',-1)">-</button>
<input type="number" id="minutes">
<button onclick="step('minutes',1)">+</button>

</div>

</div>

</div>

<div class="result" id="timeResult"></div>

</div>



<div class="card">

<h2>Progress Predictor</h2>

<label>Current Stroll</label>
<input type="number" id="stroll">

<label>Current Stamina</label>
<input type="number" id="stamina">

<label>Sakuramochi (Inventory)</label>
<input type="number" id="mochi">

<label>Target Score</label>
<input type="number" id="target" value="7500">

<h3>Crystal Packs</h3>

<div class="note">
199 Pack = 9 Mochi<br>
988 Pack = 18 Mochi<br>
1988 Pack = 27 Mochi
</div>

<div class="grid">

<div>

199 Crystal Pack

<div class="stepper">

<button onclick="step('pack199',-1)">-</button>
<input type="number" id="pack199">
<button onclick="step('pack199',1)">+</button>

</div>

</div>

<div>

988 Crystal Pack

<div class="stepper">

<button onclick="step('pack988',-1)">-</button>
<input type="number" id="pack988">
<button onclick="step('pack988',1)">+</button>

</div>

</div>

<div>

1988 Crystal Pack

<div class="stepper">

<button onclick="step('pack1988',-1)">-</button>
<input type="number" id="pack1988">
<button onclick="step('pack1988',1)">+</button>

</div>

</div>

</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="result" id="progressResult"></div>

<div class="subresult" id="recommendResult"></div>

<div class="buttons">

<button class="action" onclick="copyResult()">Copy Result</button>
<button class="action" onclick="resetAll()">Reset</button>

</div>

</div>


<div class="card">

<h2>Kagura Dance Calculator</h2>

<label>Fellow Power</label>
<input type="number" id="power">

<label>Support Bonus %</label>
<input type="number" id="bonus">

<label>Sakura Coins Used</label>
<input type="number" id="coins">

<div class="result" id="kaguraResult"></div>

</div>

<div class="footer">
Dev by @thinking.j17 | cozyneko guild S12
</div>

</div>


<script>

function format(n){
return Math.floor(n).toLocaleString()
}


function step(id,delta){

let el=document.getElementById(id)

let value=Number(el.value||0)+delta

if(value<0)value=0

el.value=value

calculateAll()

}


function getRemainingMinutes(){

let d=Math.max(0,Number(days.value||0))
let h=Math.max(0,Number(hours.value||0))
let m=Math.max(0,Number(minutes.value||0))

return d*1440 + h*60 + m

}


function getRegen(){

let minutes=getRemainingMinutes()

let regen=Math.floor(minutes/20)-1

if(regen<0) regen=0

return regen

}


function getDaysLeft(){

return Math.floor(getRemainingMinutes()/1440)

}


function getPackLimit(){

return getDaysLeft()*3

}


function getPackMochi(){

return (Number(pack199.value||0)*9)+
(Number(pack988.value||0)*18)+
(Number(pack1988.value||0)*27)

}


function calcTime(){

let minutes=getRemainingMinutes()
let regen=getRegen()

timeResult.innerHTML=

"Remaining Minutes: "+format(minutes)+"<br>"+
"Regen Stamina: "+format(regen)

}


function calcProgress(){

let stroll=Number(stroll.value||0)
let stamina=Number(stamina.value||0)

let inventoryMochi=Number(mochi.value||0)
let packMochi=getPackMochi()

let totalMochi=inventoryMochi+packMochi

let regen=getRegen()

let totalStamina=
stamina+
regen+
(totalMochi*5)

let finalStroll=stroll+totalStamina

let target=Number(target.value||0)

let percent=Math.min((finalStroll/target)*100,100)

bar.style.width=percent+"%"

let remainingScore=target-finalStroll

if(remainingScore<0) remainingScore=0

let neededMochi=Math.ceil(remainingScore/5)

progressResult.innerHTML=

"Final Stroll: "+format(finalStroll)+"<br>"+
"Remaining Score: "+format(remainingScore)+"<br>"+
"Needed Mochi: "+format(neededMochi)

recommendPacks(neededMochi)

}


function recommendPacks(needed){

let limit=getPackLimit()

let use1988=Math.min(Math.floor(needed/27),limit)
needed-=use1988*27

let use988=Math.min(Math.floor(needed/18),limit)
needed-=use988*18

let use199=Math.min(Math.ceil(needed/9),limit)

let crystal=
(use1988*1988)+
(use988*988)+
(use199*199)

let missing=Math.ceil(needed)

let enough=needed<=0

recommendResult.innerHTML=

"Recommended Packs<br><br>"+

"1988 × "+use1988+" / "+limit+"<br>"+
"988 × "+use988+" / "+limit+"<br>"+
"199 × "+use199+" / "+limit+"<br><br>"+

"Crystal Needed: "+format(crystal)+"<br><br>"+

(enough
? "✓ Enough to reach target"
: "✗ Not enough packs within remaining days<br>"+
"You still need "+format(missing)+" Mochi.<br>"+
"Buy additional Mochi from Bundle Shop.")

}


function calcKagura(){

let power=Number(powerInput.value||0)
let bonus=Number(bonusInput.value||0)
let coins=Number(coinsInput.value||0)

let faith=(power*(1+bonus/100)*coins)/1000

kaguraResult.innerHTML=

"Faith Earned: "+format(faith)+"<br>"+
"Faith per Coin: "+format(faith/coins)

}


function calculateAll(){

calcTime()
calcProgress()
calcKagura()
saveData()

}


function saveData(){

document.querySelectorAll("input").forEach(i=>{
localStorage.setItem(i.id,i.value)
})

}


function loadData(){

document.querySelectorAll("input").forEach(i=>{
let v=localStorage.getItem(i.id)
if(v) i.value=v
})

}


function resetAll(){

localStorage.clear()
location.reload()

}


function copyResult(){

let text=

progressResult.innerText+
"\n\n"+
recommendResult.innerText

navigator.clipboard.writeText(text)

alert("Copied!")

}


document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",calculateAll)
})


const powerInput=document.getElementById("power")
const bonusInput=document.getElementById("bonus")
const coinsInput=document.getElementById("coins")

const timeResult=document.getElementById("timeResult")
const progressResult=document.getElementById("progressResult")
const recommendResult=document.getElementById("recommendResult")
const kaguraResult=document.getElementById("kaguraResult")

const bar=document.getElementById("bar")

loadData()
calculateAll()

</script>

</body>
</html>
