<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Touno Island Calculator</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#eef2ff;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:900px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
margin-top:10px;
}

label{
font-size:14px;
font-weight:600;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
margin-top:4px;
}

.stepper{
display:flex;
gap:6px;
margin-top:4px;
}

.stepper input{
text-align:center;
}

.stepper button{
width:36px;
height:36px;
border:none;
border-radius:6px;
background:#6366f1;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
touch-action:manipulation;
}

button.action{
background:#4f46e5;
border:none;
color:white;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
margin-right:10px;
}

.result{
background:#eef2ff;
padding:12px;
border-radius:8px;
margin-top:12px;
font-size:14px;
line-height:1.6;
}

.progress{
height:10px;
background:#ddd;
border-radius:6px;
margin-top:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#4f46e5;
}

.small{
font-size:13px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<h1>Touno Island Calculator</h1>

<div class="card">

<h2>Remaining Time</h2>

<div class="grid">

<div>
<label>Days</label>
<div class="stepper">
<button onclick="step('days',-1)">-</button>
<input type="number" id="days" value="0">
<button onclick="step('days',1)">+</button>
</div>
</div>

<div>
<label>Hours</label>
<div class="stepper">
<button onclick="step('hours',-1)">-</button>
<input type="number" id="hours" value="0">
<button onclick="step('hours',1)">+</button>
</div>
</div>

<div>
<label>Minutes</label>
<div class="stepper">
<button onclick="step('minutes',-1)">-</button>
<input type="number" id="minutes" value="0">
<button onclick="step('minutes',1)">+</button>
</div>
</div>

</div>

<div class="result" id="timeResult"></div>

</div>

<div class="card">

<h2>Progress Predictor</h2>

<div class="grid">

<div>
<label>Current Stroll</label>
<input type="number" id="stroll">
</div>

<div>
<label>Current Stamina</label>
<input type="number" id="stamina">
</div>

<div>
<label>Sakuramochi (Inventory)</label>
<input type="number" id="mochi">
</div>

<div>
<label>Target Score</label>
<input type="number" id="target" value="7500">
</div>

</div>

<h3>Crystal Packs</h3>

<div class="small">
199 Pack = 9 Mochi<br>
988 Pack = 18 Mochi<br>
1988 Pack = 27 Mochi<br>
Limit: 3 per pack per day
</div>

<div class="grid">

<div>
<label>199 Crystal Pack</label>
<div class="stepper">
<button onclick="step('pack199',-1)">-</button>
<input type="number" id="pack199" value="0">
<button onclick="step('pack199',1)">+</button>
</div>
</div>

<div>
<label>988 Crystal Pack</label>
<div class="stepper">
<button onclick="step('pack988',-1)">-</button>
<input type="number" id="pack988" value="0">
<button onclick="step('pack988',1)">+</button>
</div>
</div>

<div>
<label>1988 Crystal Pack</label>
<div class="stepper">
<button onclick="step('pack1988',-1)">-</button>
<input type="number" id="pack1988" value="0">
<button onclick="step('pack1988',1)">+</button>
</div>
</div>

</div>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<div class="result" id="result"></div>

<br>

<button class="action" onclick="copyResult()">Copy Result</button>
<button class="action" onclick="resetCalc()">Reset</button>

</div>

</div>

<script>

function get(id){
return Number(document.getElementById(id).value)||0
}

function step(id,amount){

let el=document.getElementById(id)
let value=Number(el.value)||0
value+=amount

if(value<0)value=0

if(id.includes("pack")){
let days=get("days")
let limit=days*3
if(value>limit)value=limit
}

el.value=value

calculate()
save()

}

function calculate(){

let days=get("days")
let hours=get("hours")
let minutes=get("minutes")

let totalMinutes=days*1440+hours*60+minutes
let regen=Math.floor(totalMinutes/5)

document.getElementById("timeResult").innerHTML=
`Remaining Minutes: <b>${totalMinutes}</b><br>
Regen Stamina: <b>${regen}</b>`

let stroll=get("stroll")
let stamina=get("stamina")
let mochi=get("mochi")
let target=get("target")

let p199=get("pack199")
let p988=get("pack988")
let p1988=get("pack1988")

let packMochi=p199*9+p988*18+p1988*27

let totalMochi=mochi+packMochi

let score=stroll+(stamina+regen+totalMochi)*5

let percent=Math.min(score/target*100,100)

document.getElementById("progressBar").style.width=percent+"%"

let need=target-score

let result=""

if(score>=target){

result=`✅ Target reachable<br>
Predicted Score: <b>${Math.floor(score)}</b>`

}else{

let mochiNeed=Math.ceil(need/5)

result=`❌ Not enough packs within remaining days<br>
Need <b>${mochiNeed}</b> more Sakuramochi<br>
Consider buying from Bundle Shop.`

}

document.getElementById("result").innerHTML=result

}

function save(){

localStorage.setItem("tounoCalc",JSON.stringify({

days:get("days"),
hours:get("hours"),
minutes:get("minutes"),
stroll:get("stroll"),
stamina:get("stamina"),
mochi:get("mochi"),
target:get("target"),
p199:get("pack199"),
p988:get("pack988"),
p1988:get("pack1988")

}))

}

function load(){

let data=localStorage.getItem("tounoCalc")

if(!data)return

data=JSON.parse(data)

days.value=data.days||0
hours.value=data.hours||0
minutes.value=data.minutes||0
stroll.value=data.stroll||0
stamina.value=data.stamina||0
mochi.value=data.mochi||0
target.value=data.target||7500
pack199.value=data.p199||0
pack988.value=data.p988||0
pack1988.value=data.p1988||0

}

function resetCalc(){

localStorage.removeItem("tounoCalc")
location.reload()

}

function copyResult(){

navigator.clipboard.writeText(
document.getElementById("result").innerText
)

}

document.querySelectorAll("input").forEach(el=>{
el.addEventListener("input",()=>{
calculate()
save()
})
})

load()
calculate()

</script>

</body>
</html>
