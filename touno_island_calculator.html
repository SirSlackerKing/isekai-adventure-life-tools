<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Touno Island Calculator</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{
margin:0;
background:#eef2ff;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:900px;
padding:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.home{
text-align:center;
margin-bottom:20px;
}

.home a{
text-decoration:none;
background:#6366f1;
color:white;
padding:8px 14px;
border-radius:6px;
}

.card{
background:white;
padding:18px;
border-radius:10px;
margin-bottom:18px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h2{
margin-top:0;
}

input{
width:100%;
padding:8px;
margin:6px 0 12px 0;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.result{
background:#f3f4f6;
padding:10px;
border-radius:6px;
margin-top:10px;
}

.progress{
width:100%;
background:#e5e7eb;
border-radius:8px;
overflow:hidden;
height:18px;
margin-top:10px;
}

.bar{
height:100%;
background:#6366f1;
width:0%;
}

.note{
font-size:13px;
color:#555;
}

@media(max-width:600px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Touno Island Calculator</h1>

<div class="home">
<a href="/">🏠 Home</a>
</div>


<!-- EVENT TIME -->

<div class="card">

<h2>Event Time Setup</h2>

<div class="grid">

<div>
<label>Event Start</label>
<input type="datetime-local" id="start">
</div>

<div>
<label>Event End</label>
<input type="datetime-local" id="end">
</div>

</div>

<div class="grid">

<div>
<label>Simulation Time</label>
<input type="datetime-local" id="now">
</div>

<div style="display:flex;align-items:end;">
<button onclick="useNow()">Use Realtime Now</button>
</div>

</div>

<div class="result" id="timeInfo"></div>

<p class="note">
Stamina regenerates every 20 minutes.  
Calculator subtracts 1 stamina because the last regen at event end cannot be used.
</p>

</div>


<!-- PROGRESS -->

<div class="card">

<h2>Event Progress Predictor</h2>

<div class="grid">

<div>
<label>Current Stroll</label>
<input type="number" id="stroll" value="0">
</div>

<div>
<label>Current Stamina</label>
<input type="number" id="stamina" value="0">
</div>

</div>

<label>Sakuramochi</label>
<input type="number" id="mochi" value="0">

<label>Target Reward</label>
<input type="number" id="target" value="7500">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="result" id="progressResult"></div>

</div>


<!-- CRYSTAL PLANNER -->

<div class="card">

<h2>Crystal Pack Planner</h2>

<div class="grid">

<div>
<label>Days Remaining</label>
<input type="number" id="days" value="1">
</div>

<div></div>

</div>

<div class="grid">

<div>
<label>188 Pack / day</label>
<input type="number" id="pack188" value="0">
</div>

<div>
<label>988 Pack / day</label>
<input type="number" id="pack988" value="0">
</div>

</div>

<label>1988 Pack / day</label>
<input type="number" id="pack1988" value="0">

<div class="result" id="crystalResult"></div>

<p class="note">
188 pack gives best value per Sakuramochi.
</p>

</div>


<!-- KAGURA -->

<div class="card">

<h2>Kagura Dance Calculator</h2>

<div class="grid">

<div>
<label>Fellow Power</label>
<input type="number" id="power" value="1000000">
</div>

<div>
<label>Support Bonus (%)</label>
<input type="number" id="bonus" value="0">
</div>

</div>

<label>Sakura Coins</label>
<input type="number" id="coins" value="1">

<div class="result" id="kaguraResult"></div>

</div>

</div>


<script>

function useNow(){

let now = new Date()
document.getElementById("now").value = now.toISOString().slice(0,16)
calculateAll()

}

function getMinutesRemaining(){

let start = new Date(document.getElementById("start").value)
let end = new Date(document.getElementById("end").value)
let now = new Date(document.getElementById("now").value)

if(!start || !end || !now) return 0

if(now < start) now = start
if(now > end) return 0

let diff = end - now
return Math.floor(diff/60000)

}

function getRegen(){

let minutes = getMinutesRemaining()

let regen = Math.floor(minutes/20) - 1

if(regen < 0) regen = 0

return regen

}

function progressCalc(){

let stroll = Number(strollInput.value)
let stamina = Number(staminaInput.value)
let mochi = Number(mochiInput.value)

let regen = getRegen()

let totalStamina =
stamina + regen + (mochi*5)

let final =
stroll + totalStamina

let target = Number(targetInput.value)

let percent = Math.min((final/target)*100,100)

bar.style.width = percent+"%"

progressResult.innerHTML =

"Regen Stamina: "+regen+"<br>"+
"Total Stamina: "+totalStamina+"<br>"+
"Predicted Final Stroll: "+final

}

function crystalCalc(){

let days = Number(daysInput.value)

let p188 = Number(pack188Input.value)
let p988 = Number(pack988Input.value)
let p1988 = Number(pack1988Input.value)

let mochi =
(days*p188*4) +
(days*p988*8) +
(days*p1988*12)

let stamina = mochi*5

let crystals =
(days*p188*188) +
(days*p988*988) +
(days*p1988*1988)

crystalResult.innerHTML =

"Total Mochi: "+mochi+"<br>"+
"Total Stamina: "+stamina+"<br>"+
"Total Crystals: "+crystals

}

function kaguraCalc(){

let power = Number(powerInput.value)
let bonus = Number(bonusInput.value)
let coins = Number(coinsInput.value)

let faith =
power * (1 + bonus/100) * coins / 1000

kaguraResult.innerHTML =

"Faith Gained: "+Math.floor(faith)+"<br>"+
"Faith per Coin: "+Math.floor(faith/coins)

}

function calculateAll(){

let minutes = getMinutesRemaining()
let regen = getRegen()

timeInfo.innerHTML =
"Minutes Remaining: "+minutes+
"<br>Regen Stamina: "+regen

progressCalc()
crystalCalc()
kaguraCalc()

}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",calculateAll)
})

const strollInput = document.getElementById("stroll")
const staminaInput = document.getElementById("stamina")
const mochiInput = document.getElementById("mochi")
const targetInput = document.getElementById("target")

const daysInput = document.getElementById("days")
const pack188Input = document.getElementById("pack188")
const pack988Input = document.getElementById("pack988")
const pack1988Input = document.getElementById("pack1988")

const powerInput = document.getElementById("power")
const bonusInput = document.getElementById("bonus")
const coinsInput = document.getElementById("coins")

const progressResult = document.getElementById("progressResult")
const crystalResult = document.getElementById("crystalResult")
const kaguraResult = document.getElementById("kaguraResult")
const timeInfo = document.getElementById("timeInfo")
const bar = document.getElementById("bar")

calculateAll()

</script>

</body>
</html>
