<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Isekai Adventure Life Blessing Calculator</title>

<link rel="icon" href="images/images/blessing/profile_figure_unlock_upgrade.png">

<style>

*{
box-sizing:border-box;
transition:0.2s;
}

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(180deg,#eef3ff,#dce7ff);
display:flex;
justify-content:center;
}

body.dark{
background:#1b1e2b;
color:white;
}

body.dark .section{
background:#2a2f44;
}

body.dark .card{
background:#2f3550;
}

body.dark input{
background:#1f2436;
color:white;
}

body.dark .result{
background:#2a2f44;
}

body.dark .resultBox{
background:#3a4060;
}

.darkBtn{
background:#222;
}

.homeBtn{
background:#444;
}

.container{
width:1000px;
max-width:95%;
padding:20px;
}

h1{
text-align:center;
color:#3b4ba8;
font-size:28px;
margin-bottom:4px;
}

.subtitle{
text-align:center;
font-size:13px;
color:#6b7280;
margin-bottom:20px;
}

.section{
background:white;
border-radius:16px;
padding:18px;
margin-bottom:18px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
gap:12px;
}

.card{
background:#f6f8ff;
border-radius:12px;
padding:12px;
text-align:center;
}

.card img{
width:76px;
height:76px;
object-fit:contain;
border-radius:12px;
background:white;
padding:4px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
margin-bottom:8px;
}

.name{
font-size:13px;
min-height:36px;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

.controls button{
background:#6c8cff;
border:none;
color:white;
width:28px;
height:28px;
border-radius:6px;
cursor:pointer;
}

input{
width:40px;
text-align:center;
border:none;
background:white;
border-radius:6px;
padding:4px;
}

.result{
background:white;
border-radius:16px;
padding:40px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
align-items:center;
}

.resultRow{
display:flex;
justify-content:center;
gap:16px;
flex-wrap:wrap;
}

.resultBox{
background:#f4f7ff;
padding:14px 24px;
border-radius:12px;
font-size:14px;
font-weight:600;
min-width:90px;
text-align:center;
}

.resultBox div{
font-size:20px;
margin-top:4px;
}

.resultBox.min{color:#3cb371}
.resultBox.avg{color:#3b82f6}
.resultBox.max{color:#ff8c42}

.itemsUsed{
margin-top:14px;
font-size:14px;
opacity:0.8;
}

.buttonRow{
margin-top:20px;
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}

.actionBtn{
border:none;
padding:10px 18px;
font-size:14px;
font-weight:600;
border-radius:10px;
cursor:pointer;
color:white;
}

.copyBtn{background:linear-gradient(135deg,#5dbb63,#3fa34d);}
.resetBtn{background:#ff6b6b;}
.shareBtn{background:#5865F2;}
.homeBtn{background:#555;}

</style>
</head>

<body>

<div class="container">

<h1>Isekai Adventure Life Blessing Calculator</h1>
<div class="subtitle">v1.0 • by @Thinking.j17 | cozyneko guild S12</div>

<div style="display:flex;justify-content:flex-start;gap:10px;margin-bottom:10px;">

<button class="actionBtn homeBtn"
onclick="location.href='index.html'">
🏠 Home
</button>

<button class="actionBtn darkBtn"
onclick="toggleDark()">
🌙 Dark
</button>

</div>

<div class="section">
<h2>Fixed Items</h2>
<div class="grid" id="fixedItems"></div>
</div>

<div class="section">
<h2>Random Items</h2>
<div class="grid" id="randomItems"></div>
</div>

<div class="section">
<h2>Bonus</h2>
<div class="grid" id="bonusItems"></div>
</div>

<div class="result">

<div class="resultRow">

<div class="resultBox min">
Min
<div id="min">0</div>
</div>

<div class="resultBox avg">
Avg
<div id="avg">0</div>
</div>

<div class="resultBox max">
Max
<div id="max">0</div>
</div>

</div>

<div class="itemsUsed">
Items used: <span id="itemsUsed">0</span>
</div>

<div class="buttonRow">

<button class="actionBtn copyBtn" onclick="copyResult()">Copy Result</button>
<button class="actionBtn shareBtn" onclick="shareBuild()">Share Build</button>
<button class="actionBtn copyBtn" onclick="copyImage()">Copy Screenshot</button>
<button class="actionBtn resetBtn" onclick="resetAll()">Reset</button>

</div>

</div>

</div>

<script>

const fixedItems=[
{name:"Flower Necklace",img:"flower_necklace.png",value:1},
{name:"Jewel Necklace",img:"jewel_necklace.png",value:1},
{name:"Strange Pearl",img:"strange_pearl.png",value:5},
{name:"Hiemspresent Hat",img:"hiemspresent_hat.png",value:5}
]

const randomItems=[
{name:"Blessing Gachapon",img:"blessing_power_gachapon.png",min:10,max:30},
{name:"Omamori",img:"omamori.png",min:10,max:30},
{name:"Mandrake",img:"mandrake.png",min:1,max:3},
{name:"Muddled Mushroom",img:"muddled_mushroom.png",min:2,max:5},
{name:"Grassy Bunny",img:"grassy_bunny.png",min:3,max:6},
{name:"Chirping Chick",img:"chirping_chick.png",min:4,max:10},
{name:"Gorgeous Horse",img:"gorgeous_horse.png",min:5,max:16},
{name:"Blooming Fox",img:"blooming_fox.png",min:7,max:24},
{name:"Frozen Dragon",img:"frozen_dragon.png",min:10,max:32},
{name:"Flaming Lion",img:"flaming_lion.png",min:14,max:48}
]

const bonusItems=[
{name:"Family 2★ Unlock",img:"family_2star_skin.png",value:150},
{name:"Family 2★ Upgrade",img:"family_2star_skin.png",value:200},
{name:"Family 3★ Unlock",img:"family_3star_skin.png",value:300},
{name:"Family 3★ Upgrade",img:"family_3star_skin.png",value:500},
{name:"Family 4★ Unlock",img:"family_4star_skin.png",value:500},
{name:"Family 4★ Upgrade",img:"family_4star_skin.png",value:1000},
{name:"Inn Gift",img:"inn_gift.png",value:2},
{name:"Fishing Antique",img:"fishing_antique.png",value:20},
{name:"Profile Figure",img:"profile_figure_unlock_upgrade.png",value:20}
]

function makeGrid(list,id){

let html=""

list.forEach((i,index)=>{

html+=`
<div class="card">
<img src="images/images/blessing/${i.img}">
<div class="name">${i.name}</div>
<div class="controls">
<button onclick="change('${id}${index}',-1)">-</button>
<input id="${id}${index}" value="0">
<button onclick="change('${id}${index}',1)">+</button>
</div>
</div>`

})

document.getElementById(id).innerHTML=html

}

makeGrid(fixedItems,"fixedItems")
makeGrid(randomItems,"randomItems")
makeGrid(bonusItems,"bonusItems")

function change(id,a){
let el=document.getElementById(id)
let v=parseInt(el.value||0)+a
if(v<0)v=0
el.value=v
calc()
}

function calc(){

let min=0
let max=0
let items=0

randomItems.forEach((i,index)=>{
let c=parseInt(document.getElementById("randomItems"+index).value||0)
min+=c*i.min
max+=c*i.max
items+=c
})

fixedItems.forEach((i,index)=>{
let c=parseInt(document.getElementById("fixedItems"+index).value||0)
min+=c*i.value
max+=c*i.value
items+=c
})

bonusItems.forEach((i,index)=>{
let c=parseInt(document.getElementById("bonusItems"+index).value||0)
min+=c*i.value
max+=c*i.value
items+=c
})

let avg=Math.floor((min+max)/2)

document.getElementById("min").innerText=min
document.getElementById("avg").innerText=avg
document.getElementById("max").innerText=max
document.getElementById("itemsUsed").innerText=items

}

function resetAll(){
document.querySelectorAll("input").forEach(i=>i.value=0)
calc()
}

function copyResult(){

let text=`Isekai Adventure Life Blessing

Min: ${min.innerText}
Avg: ${avg.innerText}
Max: ${max.innerText}`

navigator.clipboard.writeText(text)

alert("Copied!")

}

function shareBuild(){

let data=[]
document.querySelectorAll("input").forEach(i=>data.push(i.value))

let url=location.origin+location.pathname+"?build="+data.join(",")

navigator.clipboard.writeText(url)

alert("Build link copied!")

}

function copyImage(){

let canvas=document.createElement("canvas")
canvas.width=600
canvas.height=250

let ctx=canvas.getContext("2d")

ctx.fillStyle="#1c1f2b"
ctx.fillRect(0,0,600,250)

ctx.fillStyle="#fff"
ctx.font="26px Segoe UI"

ctx.fillText("Isekai Adventure Life Blessing",40,70)

ctx.font="20px Segoe UI"

ctx.fillText("Min: "+min.innerText,40,150)
ctx.fillText("Avg: "+avg.innerText,40,190)
ctx.fillText("Max: "+max.innerText,40,230)

canvas.toBlob(async blob=>{
await navigator.clipboard.write([
new ClipboardItem({'image/png':blob})
])
alert("Image copied!")
})

}

calc()

function toggleDark(){

document.body.classList.toggle("dark")

localStorage.setItem(
"darkmode",
document.body.classList.contains("dark")
)

}

if(localStorage.getItem("darkmode")==="true"){
document.body.classList.add("dark")
}
  
</script>

</body>
</html>
