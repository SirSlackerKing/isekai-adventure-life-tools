<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Isekai Adventure Life Blessing Calculator</title>

<link rel="icon" href="images/images/blessing/profile_figure_unlock_upgrade.png">

<style>

/* ใช้ CSS เดิมทั้งหมดจาก intimacy */

*{
box-sizing:border-box;
transition:0.2s;
}

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(180deg,#eef3ff,#dce7ff);
display:flex;
justify-content:center;
}

body.dark{
background:#1c1f2b;
color:#eee;
}

.container{
width:1000px;
max-width:95%;
padding:20px;
}

h1{
text-align:center;
color:#3b4ba8;
font-size:28px;
margin-bottom:4px;
}

body.dark h1{
color:#9db1ff;
}

.subtitle{
text-align:center;
font-size:13px;
color:#6b7280;
margin-bottom:20px;
}

body.dark .subtitle{
color:#aaa;
}

.section{
background:white;
border-radius:16px;
padding:18px;
margin-bottom:18px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

body.dark .section{
background:#2a2e3c;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
gap:12px;
}

.card{
background:#f6f8ff;
border-radius:12px;
padding:12px;
text-align:center;
}

body.dark .card{
background:#353a4c;
}

.card img{
width:76px;
height:76px;
object-fit:contain;
border-radius:12px;
background:white;
padding:4px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
margin-bottom:8px;
}

.name{
font-size:13px;
min-height:36px;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

.controls button{
background:#6c8cff;
border:none;
color:white;
width:28px;
height:28px;
border-radius:6px;
cursor:pointer;
}

input{
width:40px;
text-align:center;
border:none;
background:white;
border-radius:6px;
padding:4px;
}

.result{
background:white;
border-radius:16px;
padding:40px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
align-items:center;
}

body.dark .result{
background:#2a2e3c;
}

.resultRow{
display:flex;
justify-content:center;
gap:16px;
flex-wrap:wrap;
}

.resultBox{
background:#f4f7ff;
padding:14px 24px;
border-radius:12px;
font-size:14px;
font-weight:600;
min-width:90px;
text-align:center;
}

body.dark .resultBox{
background:#3a4056;
}

.resultBox div{
font-size:20px;
margin-top:4px;
}

.resultBox.min{color:#3cb371}
.resultBox.avg{color:#3b82f6}
.resultBox.max{color:#ff8c42}

</style>
</head>

<body>

<div class="container">

<h1>Isekai Adventure Life Blessing Calculator</h1>
<div class="subtitle">Blessing Tool</div>

<div class="section">
<h2>Fixed Items</h2>
<div class="grid" id="fixedItems"></div>
</div>

<div class="section">
<h2>Random Items</h2>
<div class="grid" id="randomItems"></div>
</div>

<div class="section">
<h2>Bonus</h2>
<div class="grid" id="bonusItems"></div>
</div>

<div class="result">

<div class="resultRow">

<div class="resultBox min">
Min
<div id="min">0</div>
</div>

<div class="resultBox avg">
Avg
<div id="avg">0</div>
</div>

<div class="resultBox max">
Max
<div id="max">0</div>
</div>

</div>

</div>

</div>

<script>

const fixedItems=[

{name:"Flower Necklace",img:"flower_necklace.png",value:1},
{name:"Jewel Necklace",img:"jewel_necklace.png",value:1},
{name:"Strange Pearl",img:"strange_pearl.png",value:5},
{name:"Hiemspresent Hat",img:"hiemspresent_hat.png",value:5}

]

const randomItems=[

{name:"Blessing Power Gachapon",img:"blessing_power_gachapon.png",min:10,max:30},
{name:"Omamori",img:"omamori.png",min:10,max:30},
{name:"Mandrake",img:"mandrake.png",min:1,max:3},
{name:"Muddled Mushroom",img:"muddled_mushroom.png",min:2,max:5},
{name:"Grassy Bunny",img:"grassy_bunny.png",min:3,max:6},
{name:"Chirping Chick",img:"chirping_chick.png",min:4,max:10},
{name:"Gorgeous Horse",img:"gorgeous_horse.png",min:5,max:16},
{name:"Blooming Fox",img:"blooming_fox.png",min:7,max:24},
{name:"Frozen Dragon",img:"frozen_dragon.png",min:10,max:32},
{name:"Flaming Lion",img:"flaming_lion.png",min:14,max:48}

]

const bonusItems=[

{name:"Family 2★ Skin Unlock",img:"family_2star_skin.png",value:150},
{name:"Family 2★ Skin Upgrade",img:"family_2star_skin.png",value:200},
{name:"Family 3★ Skin Unlock",img:"family_3star_skin.png",value:300},
{name:"Family 3★ Skin Upgrade",img:"family_3star_skin.png",value:500},
{name:"Family 4★ Skin Unlock",img:"family_4star_skin.png",value:500},
{name:"Family 4★ Skin Upgrade",img:"family_4star_skin.png",value:1000},
{name:"Inn Gift",img:"inn_gift.png",value:2},
{name:"Fishing Antique",img:"fishing_antique.png",value:20},
{name:"Profile Figure Unlock & Upgrade",img:"profile_figure_unlock_upgrade.png",value:20}

]

function makeGrid(list,id){

let html=""

list.forEach((i,index)=>{

let tip = i.min ? `${i.min}-${i.max}` : `${i.value}`

html+=`
<div class="card">
<img src="images/images/blessing/${i.img}" title="${tip}">
<div class="name">${i.name}</div>
<div class="controls">
<button onclick="change('${id}${index}',-1)">-</button>
<input id="${id}${index}" value="0">
<button onclick="change('${id}${index}',1)">+</button>
</div>
</div>`

})

document.getElementById(id).innerHTML=html

}

makeGrid(fixedItems,"fixedItems")
makeGrid(randomItems,"randomItems")
makeGrid(bonusItems,"bonusItems")

function change(id,a){

let el=document.getElementById(id)
let v=parseInt(el.value||0)+a

if(v<0)v=0

el.value=v

calc()

}

function calc(){

let min=0
let max=0

randomItems.forEach((i,index)=>{
let c=parseInt(document.getElementById("randomItems"+index).value||0)
min+=c*i.min
max+=c*i.max
})

fixedItems.forEach((i,index)=>{
let c=parseInt(document.getElementById("fixedItems"+index).value||0)
min+=c*i.value
max+=c*i.value
})

bonusItems.forEach((i,index)=>{
let c=parseInt(document.getElementById("bonusItems"+index).value||0)
min+=c*i.value
max+=c*i.value
})

let avg=Math.floor((min+max)/2)

document.getElementById("min").innerText=min
document.getElementById("avg").innerText=avg
document.getElementById("max").innerText=max

}

calc()

</script>

</body>
</html>
