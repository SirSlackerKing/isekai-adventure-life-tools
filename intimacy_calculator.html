<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Isekai Adventure Life Intimacy Calculator</title>

<link rel="icon" href="images/profile_figure.png">

<style>

*{
box-sizing:border-box;
transition:0.2s;
}

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(180deg,#eef3ff,#dce7ff);
display:flex;
justify-content:center;
}

body.dark{
background:#1c1f2b;
color:#eee;
}

.container{
width:1000px;
max-width:95%;
padding:20px;
}

h1{
text-align:center;
color:#3b4ba8;
font-size:28px;
margin-bottom:4px;
}

body.dark h1{
color:#9db1ff;
}

.subtitle{
text-align:center;
font-size:13px;
color:#6b7280;
margin-bottom:20px;
}

body.dark .subtitle{
color:#aaa;
}

.section{
background:white;
border-radius:16px;
padding:18px;
margin-bottom:18px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

body.dark .section{
background:#2a2e3c;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
gap:12px;
}

.card{
background:#f6f8ff;
border-radius:12px;
padding:12px;
text-align:center;
}

body.dark .card{
background:#353a4c;
}

.card img{
width:76px;
height:76px;
object-fit:contain;
border-radius:12px;
background:white;
padding:4px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
margin-bottom:8px;
}

.name{
font-size:13px;
min-height:36px;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

.controls button,
.familyBox button{
background:#6c8cff;
border:none;
color:white;
width:28px;
height:28px;
border-radius:6px;
cursor:pointer;

touch-action: manipulation;
user-select: none;
}

input{
width:40px;
text-align:center;
border:none;
background:white;
border-radius:6px;
padding:4px;
}

.familyBox{
display:flex;
justify-content:center;
align-items:center;
gap:14px;
font-size:22px;
font-weight:600;
padding:10px;
}

.familyBox input{
width:60px;
font-size:20px;
font-weight:600;
padding:6px;
}

.result{
background:white;
border-radius:16px;
padding:40px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
align-items:center;
}

body.dark .result{
background:#2a2e3c;
}

.resultRow{
display:flex;
justify-content:center;
gap:16px;
flex-wrap:wrap;
}

.resultBox{
background:#f4f7ff;
padding:14px 24px;
border-radius:12px;
font-size:14px;
font-weight:600;
min-width:90px;
text-align:center;
}

body.dark .resultBox{
background:#3a4056;
}

.resultBox div{
font-size:20px;
margin-top:4px;
}

.resultBox.min{color:#3cb371}
.resultBox.avg{color:#3b82f6}
.resultBox.max{color:#ff8c42}

.itemsUsed{
margin-top:14px;
font-size:14px;
opacity:0.8;
}

.buttonRow{
margin-top:20px;
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}

.actionBtn{
border:none;
padding:10px 18px;
font-size:14px;
font-weight:600;
border-radius:10px;
cursor:pointer;
color:white;
display:inline-flex;
align-items:center;
justify-content:center;
}

.copyBtn{
background:linear-gradient(135deg,#5dbb63,#3fa34d);
}

.resetBtn{
background:#ff6b6b;
}

.darkBtn{
background:#444;
}

.shareBtn{
background:#5865F2;
}

</style>
</head>

<body>

<div style="display:flex;justify-content:flex-start;gap:10px;margin-bottom:10px;">

<div class="container">

<h1>Isekai Adventure Life Intimacy Calculator</h1>
<div class="subtitle">v2.0 • by @Thinking.j17 | cozyneko guild S12</div>

<div style="display:flex;justify-content:flex-start;gap:10px;margin-bottom:10px;">

<button class="actionBtn darkBtn" onclick="location.href='index.html'">
🏠 Home
</button>

<button class="actionBtn darkBtn" onclick="toggleDark()">
🌙 Dark Mode
</button>

</div>

<div class="section">

<div class="familyBox">

Family

<button onclick="change('family',-1)">-</button>
<input id="family" value="40">
<button onclick="change('family',1)">+</button>

</div>

</div>

<div class="section">
<h2>Fixed Items</h2>
<div class="grid" id="fixedItems"></div>
</div>

<div class="section">
<h2>Random Items</h2>
<div class="grid" id="randomItems"></div>
</div>

<div class="section">
<h2>Bonus</h2>
<div class="grid" id="bonusItems"></div>
</div>

<div class="section">

<h2 style="cursor:pointer" onclick="toggleCustom()">▶ Custom Value</h2>

<div id="customBox">

<div class="familyBox">

<button onclick="change('custom',-1)">-</button>
<input id="custom" value="0">
<button onclick="change('custom',1)">+</button>

</div>

</div>

</div>

<div class="result" id="resultBox">

<div class="resultRow">

<div class="resultBox min">
Min
<div id="min">0</div>
</div>

<div class="resultBox avg">
Avg
<div id="avg">0</div>
</div>

<div class="resultBox max">
Max
<div id="max">0</div>
</div>

</div>

<div class="itemsUsed">
Items used: <span id="itemsUsed">0</span>
</div>

<div class="buttonRow">

<button class="actionBtn copyBtn" onclick="copyResult()">Copy Result</button>

<button class="actionBtn shareBtn" onclick="shareBuild()">Share Build</button>

<button class="actionBtn copyBtn" onclick="copyImage()">Copy Screenshot</button>

<button class="actionBtn resetBtn" onclick="resetAll()">Reset</button>

</div>

</div>

</div>

<script>

// HOLD BUTTON SYSTEM

let holdInterval=null
let holdTimeout=null

function startHold(btn){

let id = btn.getAttribute("onclick").match(/'(.*?)'/)[1]
let val = btn.innerText=="+" ? 1 : -1

change(id,val)

holdTimeout=setTimeout(()=>{

holdInterval=setInterval(()=>{
change(id,val)
},120)

},400)

}

function stopHold(){

clearTimeout(holdTimeout)
clearInterval(holdInterval)

}

document.querySelectorAll(".controls button, .familyBox button").forEach(btn=>{

btn.addEventListener("touchstart",()=>startHold(btn))
btn.addEventListener("mousedown",()=>startHold(btn))

btn.addEventListener("touchend",stopHold)
btn.addEventListener("mouseup",stopHold)
btn.addEventListener("mouseleave",stopHold)

})

const minEl = document.getElementById("min")
const maxEl = document.getElementById("max")
const avgEl = document.getElementById("avg")
const itemsUsed = document.getElementById("itemsUsed")
const family = document.getElementById("family")

const fixedItems=[
{name:"Gold Ring",img:"gold_ring.png",value:1},
{name:"Gem Ring",img:"gem_ring.png",value:2},
{name:"Diamond Ring",img:"diamond_ring.png",value:5},
{name:"Amber of Fish",img:"amber_fish.png",value:5},
{name:"Hiemspresent Hairpin",img:"hiemspresent_hairpin.png",value:5}
]

const randomItems=[
{name:"Song Book Green Heart",img:"song1.png",min:1,max:3},
{name:"Song Book Green Castle",img:"song2.png",min:2,max:3},
{name:"Song Book Blue Princess",img:"song_blue_princess.png",min:3,max:6},
{name:"Song Book Blue Prince",img:"song_blue_prince.png",min:4,max:10},
{name:"Song Book Purple Mushroom",img:"song_purple_mushroom.png",min:5,max:16},
{name:"Song Book Purple Star",img:"song_purple_star.png",min:7,max:24},
{name:"Song Book Black Book",img:"song_black_book.png",min:10,max:32},
{name:"Song Book Red Book",img:"song_red_book.png",min:14,max:49},
{name:"Intimacy Gachapon",img:"intimacy_gachapon.png",min:10,max:30}
]

const bonusItems=[
{name:"Family 2★ Skin Unlock",img:"family_2star_skin.png",value:150},
{name:"Family 2★ Skin Upgrade",img:"family_2star_skin.png",value:200},
{name:"Family 3★ Skin Unlock",img:"family_3star_skin.png",value:300},
{name:"Family 3★ Skin Upgrade",img:"family_3star_skin.png",value:500},
{name:"Family 4★ Skin Unlock",img:"family_4star_skin.png",value:500},
{name:"Family 4★ Skin Upgrade",img:"family_4star_skin.png",value:1000},
{name:"Fishing Antique",img:"fishing_antique.png",value:20,family:true},
{name:"Inn Gift",img:"inn_gift.png",value:2,family:true},
{name:"Museum Antique",img:"museum_antique.png",value:1,family:true},
{name:"Profile Figure Unlock&Upgrade +20",img:"profile_figure.png",value:20,family:true}
]

function makeGrid(list,id){

let html=""

list.forEach((i,index)=>{

let tip = i.min ? `${i.min}-${i.max} intimacy` : `${i.value} intimacy`

html+=`
<div class="card">
<img src="images/${i.img}" title="${tip}">
<div class="name">${i.name}</div>
<div class="controls">
<button onclick="change('${id}${index}',-1)">-</button>
<input id="${id}${index}" value="0">
<button onclick="change('${id}${index}',1)">+</button>
</div>
</div>`

})

document.getElementById(id).innerHTML=html

}

makeGrid(fixedItems,"fixedItems")
makeGrid(randomItems,"randomItems")
makeGrid(bonusItems,"bonusItems")

function change(id,a){
let el=document.getElementById(id)
let v=parseInt(el.value||0)+a
if(v<0)v=0
el.value=v
calc()
saveData()
}

function calc(){

let min=0
let max=0
let items=0

randomItems.forEach((i,index)=>{
let c=parseInt(document.getElementById("randomItems"+index)?.value||0)
min+=c*i.min
max+=c*i.max
items+=c
})

fixedItems.forEach((i,index)=>{
let c=parseInt(document.getElementById("fixedItems"+index)?.value||0)
min+=c*i.value
max+=c*i.value
items+=c
})

let fam=parseInt(family.value||1)

bonusItems.forEach((i,index)=>{
let c=parseInt(document.getElementById("bonusItems"+index)?.value||0)
let val=i.family ? i.value*fam : i.value
min+=c*val
max+=c*val
items+=c
})

let custom=parseInt(document.getElementById("custom")?.value||0)

min+=custom
max+=custom

let avg=Math.floor((min+max)/2)

minEl.innerText=min
maxEl.innerText=max
avgEl.innerText=avg
itemsUsed.innerText=items

}

function shareBuild(){

let data=[]

document.querySelectorAll("input").forEach(i=>{
data.push(i.value)
})

let url = location.origin + location.pathname + "?build=" + data.join(",")

navigator.clipboard.writeText(url)

alert("Build link copied!")

}

function loadBuild(){

let params=new URLSearchParams(location.search)

if(!params.get("build")) return

let values=params.get("build").split(",")

document.querySelectorAll("input").forEach((el,i)=>{
if(values[i]) el.value=values[i]
})

}

function copyImage(){

let canvas=document.createElement("canvas")
canvas.width=600
canvas.height=300

let ctx=canvas.getContext("2d")

ctx.fillStyle="#1c1f2b"
ctx.fillRect(0,0,600,300)

ctx.fillStyle="#ffffff"
ctx.font="28px Segoe UI"
ctx.fillText("Isekai Adventure Life",40,60)

ctx.font="20px Segoe UI"
ctx.fillText("Family: "+family.value,40,120)

ctx.fillText("Min: "+minEl.innerText,40,170)
ctx.fillText("Avg: "+avgEl.innerText,40,210)
ctx.fillText("Max: "+maxEl.innerText,40,250)

canvas.toBlob(async blob=>{
await navigator.clipboard.write([
new ClipboardItem({'image/png': blob})
])
alert("Image copied!")
})

}

function toggleCustom(){

let box=document.getElementById("customBox")

box.style.display = box.style.display==="none" ? "block" : "none"

}

function copyResult(){

let text=`Isekai Adventure Life Intimacy

Family: ${family.value}

Min: ${minEl.innerText}
Avg: ${avgEl.innerText}
Max: ${maxEl.innerText}`

navigator.clipboard.writeText(text)

alert("Copied!")

}

function resetAll(){

document.querySelectorAll("input").forEach(i=>{
if(i.id!="family") i.value=0
})

calc()
saveData()

}

function toggleDark(){
document.body.classList.toggle("dark")
localStorage.setItem("darkmode",document.body.classList.contains("dark"))
}

function saveData(){

let data={}

document.querySelectorAll("input").forEach(i=>{
data[i.id]=i.value
})

localStorage.setItem("calcData",JSON.stringify(data))

}

function loadData(){

let data=localStorage.getItem("calcData")

if(!data)return

data=JSON.parse(data)

for(let k in data){
let el=document.getElementById(k)
if(el) el.value=data[k]
}

}

if(localStorage.getItem("darkmode")=="true"){
document.body.classList.add("dark")
}

loadBuild()
loadData()
calc()

console.log("Calculator Loaded v2.0")

</script>

</body>
</html>
