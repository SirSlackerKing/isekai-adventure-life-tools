<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Isekai Adventure Life Intimacy Calculator</title>

<link rel="icon" href="images/profile_figure.png">

<style>

*{
box-sizing:border-box;
transition:0.2s;
}

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(180deg,#eef3ff,#dce7ff);
display:flex;
justify-content:center;
}

body.dark{
background:#1c1f2b;
color:#eee;
}

.container{
width:1000px;
max-width:95%;
padding:20px;
}

h1{
text-align:center;
color:#3b4ba8;
font-size:28px;
margin-bottom:4px;
}

body.dark h1{
color:#9db1ff;
}

.subtitle{
text-align:center;
font-size:13px;
color:#6b7280;
margin-bottom:20px;
}

body.dark .subtitle{
color:#aaa;
}

.section{
background:white;
border-radius:16px;
padding:20px;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

body.dark .section{
background:#2a2e3c;
}

/* GRID FIX */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
max-width:520px;
margin:auto;
}

@media (min-width:700px){
.grid{
grid-template-columns:repeat(4,1fr);
max-width:900px;
}
}

/* CARD */

.card{
background:#f6f8ff;
border-radius:14px;
padding:14px;
text-align:center;
min-height:200px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

body.dark .card{
background:#353a4c;
}

.card img{
width:76px;
height:76px;
object-fit:contain;
border-radius:12px;
background:white;
padding:4px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
margin:0 auto 8px auto;
}

.name{
font-size:13px;
min-height:36px;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

.controls button,
.familyBox button{
background:#6c8cff;
border:none;
color:white;
width:28px;
height:28px;
border-radius:6px;
cursor:pointer;
touch-action: manipulation;
user-select: none;
}

input{
width:40px;
text-align:center;
border:none;
background:white;
border-radius:6px;
padding:4px;
}

.familyBox{
display:flex;
justify-content:center;
align-items:center;
gap:14px;
font-size:22px;
font-weight:600;
padding:10px;
}

.familyBox input{
width:60px;
font-size:20px;
font-weight:600;
padding:6px;
}

.result{
background:white;
border-radius:16px;
padding:40px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
align-items:center;
}

body.dark .result{
background:#2a2e3c;
}

.resultRow{
display:flex;
justify-content:center;
gap:16px;
flex-wrap:wrap;
}

.resultBox{
background:#f4f7ff;
padding:14px 24px;
border-radius:12px;
font-size:14px;
font-weight:600;
min-width:90px;
text-align:center;
}

body.dark .resultBox{
background:#3a4056;
}

.resultBox div{
font-size:20px;
margin-top:4px;
}

.resultBox.min{color:#3cb371}
.resultBox.avg{color:#3b82f6}
.resultBox.max{color:#ff8c42}

.itemsUsed{
margin-top:14px;
font-size:14px;
opacity:0.8;
}

.buttonRow{
margin-top:20px;
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}

.actionBtn{
border:none;
padding:10px 18px;
font-size:14px;
font-weight:600;
border-radius:10px;
cursor:pointer;
color:white;
display:inline-flex;
align-items:center;
justify-content:center;
}

.copyBtn{
background:linear-gradient(135deg,#5dbb63,#3fa34d);
}

.resetBtn{
background:#ff6b6b;
}

.darkBtn{
background:#444;
}

.shareBtn{
background:#5865F2;
}

</style>
</head>

<body>

<div class="container">

<h1>Isekai Adventure Life Intimacy Calculator</h1>
<div class="subtitle">v2.0 • by @Thinking.j17 | cozyneko guild S12</div>

<div style="display:flex;justify-content:flex-start;gap:10px;margin-bottom:10px;">

<button class="actionBtn darkBtn" onclick="location.href='index.html'">
🏠 Home
</button>

<button class="actionBtn darkBtn" onclick="toggleDark()">
🌙 Dark Mode
</button>

</div>

<div class="section">

<div class="familyBox">

Family

<button onclick="change('family',-1)">-</button>
<input id="family" value="40">
<button onclick="change('family',1)">+</button>

</div>

</div>

<div class="section">
<h2>Fixed Items</h2>
<div class="grid" id="fixedItems"></div>
</div>

<div class="section">
<h2>Random Items</h2>
<div class="grid" id="randomItems"></div>
</div>

<div class="section">
<h2>Bonus</h2>
<div class="grid" id="bonusItems"></div>
</div>

<div class="section">

<h2 style="cursor:pointer" onclick="toggleCustom()">▶ Custom Value</h2>

<div id="customBox">

<div class="familyBox">

<button onclick="change('custom',-1)">-</button>
<input id="custom" value="0">
<button onclick="change('custom',1)">+</button>

</div>

</div>

</div>

<div class="result" id="resultBox">

<div class="resultRow">

<div class="resultBox min">
Min
<div id="min">0</div>
</div>

<div class="resultBox avg">
Avg
<div id="avg">0</div>
</div>

<div class="resultBox max">
Max
<div id="max">0</div>
</div>

</div>

<div class="itemsUsed">
Items used: <span id="itemsUsed">0</span>
</div>

<div class="buttonRow">

<button class="actionBtn copyBtn" onclick="copyResult()">Copy Result</button>

<button class="actionBtn shareBtn" onclick="shareBuild()">Share Build</button>

<button class="actionBtn copyBtn" onclick="copyImage()">Copy Screenshot</button>

<button class="actionBtn resetBtn" onclick="resetAll()">Reset</button>

</div>

</div>

</div>

<script>
