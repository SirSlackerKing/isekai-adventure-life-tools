<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Isekai Adventure Life Power Buff Simulator</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#1f2330;
color:white;
display:flex;
justify-content:center;
}

.container{
width:1100px;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.home{
background:#444;
border:none;
padding:8px 14px;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

.panel{
background:#2a2f42;
border-radius:14px;
padding:18px;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

h1,h2,h3{
margin-top:0;
}

.desc{
font-size:13px;
color:#aaa;
margin-bottom:10px;
}

.row{
display:flex;
align-items:center;
margin:8px 0;
}

.label{
width:170px;
font-weight:600;
}

.inputbox{
display:flex;
gap:6px;
align-items:center;
}

input{
width:120px;
padding:6px;
text-align:center;
border-radius:6px;
border:none;
background:#181c28;
color:white;
font-weight:600;
}

button{
cursor:pointer;
border:none;
border-radius:6px;
padding:6px 10px;
background:#5c7cff;
color:white;
font-weight:700;
font-size:14px;
}

button:active{
transform:scale(0.92);
}

.cardgrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
}

.result{
font-size:18px;
font-weight:700;
margin:6px 0;
}

.best{
margin-top:10px;
color:#7dff9a;
font-weight:700;
}

.progress{
height:10px;
background:#111;
border-radius:5px;
overflow:hidden;
margin-bottom:6px;
}

.bar{
height:100%;
background:#5c7cff;
}

.utility{
margin-top:12px;
display:flex;
gap:10px;
}

@media(max-width:850px){

.container{
width:100%;
}

.cardgrid{
grid-template-columns:1fr;
}

.row{
flex-direction:column;
align-items:flex-start;
}

.label{
width:auto;
margin-bottom:4px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h1>Power Buff Simulator</h1>
<button class="home" onclick="location.href='index.html'">Home</button>
</div>

<div class="panel">
<div class="desc">
Estimate account power and simulate buffs.  
Input rough values (B or T) based on your characters.
</div>
</div>

<div class="cardgrid">

<div class="panel">
<h2>Setup Type Power</h2>
<div class="desc">Estimate total power for each Type.</div>
<div id="typeInputs"></div>
</div>

<div class="panel">
<h2>Setup Rank Power</h2>
<div class="desc">Estimate power by Rank.</div>
<div id="rankInputs"></div>
</div>

</div>

<div class="panel">

<h2>Buff Simulation</h2>

<h3>Type Buff</h3>
<div id="buffType"></div>

<h3>Rank Buff</h3>
<div id="buffRank"></div>

<h3>All Power Buff</h3>
<div id="buffAll"></div>

</div>

<div class="panel">

<h2>Result</h2>

<div id="totalPower" class="result"></div>
<div id="gainPower" class="result"></div>
<div id="newPower" class="result"></div>

<div id="bestBuff" class="best"></div>

<h3>Type Distribution</h3>
<div id="distribution"></div>

<div class="utility">
<button onclick="copyResult()">Copy Result</button>
<button onclick="resetAll()">Reset</button>
</div>

</div>

</div>

<script>

const types=["Inspiring","Brave","Diligent","Erudition","Freedom"];
const ranks=["SR","SSR&SSR+","UR"];

let typeInputs=[];
let rankInputs=[];
let buffTypeInputs=[];
let buffRankInputs=[];
let allBuffInput;

function parsePower(v){

if(!v) return 0;

v=v.toUpperCase().replace(/,/g,"");

if(v.includes("T")) return parseFloat(v)*1e12;
if(v.includes("B")) return parseFloat(v)*1e9;

return parseFloat(v)||0;

}

function parsePercent(v){
return parseFloat(v)||0;
}

function formatPower(v){

if(v>=1e12) return (v/1e12).toFixed(2)+"T";
if(v>=1e9) return (v/1e9).toFixed(2)+"B";

return v.toLocaleString();

}

function createRow(name,parent,isPercent=false){

let row=document.createElement("div");
row.className="row";

let label=document.createElement("div");
label.className="label";
label.innerText=name;

let box=document.createElement("div");
box.className="inputbox";

let minus=document.createElement("button");
minus.innerText="-";

let plus=document.createElement("button");
plus.innerText="+";

let input=document.createElement("input");
input.value="0";

minus.onclick=()=>{
let val=isPercent?parsePercent(input.value):parsePower(input.value);
val-=isPercent?1:1e9;
if(val<0) val=0;
input.value=isPercent?val:formatPower(val);
saveData();
calculate();
};

plus.onclick=()=>{
let val=isPercent?parsePercent(input.value):parsePower(input.value);
val+=isPercent?1:1e9;
input.value=isPercent?val:formatPower(val);
saveData();
calculate();
};

input.oninput=()=>{
saveData();
calculate();
};

box.appendChild(minus);
box.appendChild(input);
box.appendChild(plus);

row.appendChild(label);
row.appendChild(box);

parent.appendChild(row);

return input;

}

function init(){

let typeDiv=document.getElementById("typeInputs");
types.forEach(t=>typeInputs.push(createRow(t,typeDiv)));

let rankDiv=document.getElementById("rankInputs");
ranks.forEach(r=>rankInputs.push(createRow(r,rankDiv)));

let buffTypeDiv=document.getElementById("buffType");
types.forEach(t=>buffTypeInputs.push(createRow(t+" %",buffTypeDiv,true)));

let buffRankDiv=document.getElementById("buffRank");
ranks.forEach(r=>buffRankInputs.push(createRow(r+" %",buffRankDiv,true)));

let buffAllDiv=document.getElementById("buffAll");
allBuffInput=createRow("All Power %",buffAllDiv,true);

loadData();
calculate();

}

function calculate(){

let typeSum=0;
let rankSum=0;

let typeVals=typeInputs.map(i=>{
let v=parsePower(i.value);
typeSum+=v;
return v;
});

let rankVals=rankInputs.map(i=>{
let v=parsePower(i.value);
rankSum+=v;
return v;
});

let total=(typeSum && rankSum)?(typeSum+rankSum)/2:(typeSum||rankSum);

let gain=0;

buffTypeInputs.forEach((b,i)=>{
let buff=parsePercent(b.value);
let share=typeVals[i]/typeSum||0;
gain+=total*share*(buff/100);
});

buffRankInputs.forEach((b,i)=>{
let buff=parsePercent(b.value);
let share=rankVals[i]/rankSum||0;
gain+=total*share*(buff/100);
});

let allBuff=parsePercent(allBuffInput.value);
gain+=total*(allBuff/100);

let newPower=total+gain;

document.getElementById("totalPower").innerText="Estimated Account Power: "+formatPower(total);
document.getElementById("gainPower").innerText="Estimated Power Increase: "+formatPower(gain);
document.getElementById("newPower").innerText="Estimated New Power: "+formatPower(newPower);

detectBestBuff(total,typeVals,typeSum,rankVals,rankSum);
renderDistribution(typeVals,typeSum);

}

function detectBestBuff(total,typeVals,typeSum,rankVals,rankSum){

let bestName="";
let bestGain=0;

types.forEach((t,i)=>{
let gain=total*(typeVals[i]/typeSum||0)*0.01;
if(gain>bestGain){
bestGain=gain;
bestName=t+" Buff";
}
});

ranks.forEach((r,i)=>{
let gain=total*(rankVals[i]/rankSum||0)*0.01;
if(gain>bestGain){
bestGain=gain;
bestName=r+" Buff";
}
});

if(total*0.01>bestGain){
bestGain=total*0.01;
bestName="All Power Buff";
}

document.getElementById("bestBuff").innerText=
"Best Buff (per +1%): "+bestName+" → "+formatPower(bestGain);

}

function renderDistribution(vals,sum){

let div=document.getElementById("distribution");
div.innerHTML="";

vals.forEach((v,i)=>{

let share=sum?((v/sum)*100):0;

div.innerHTML+=`
<div>${types[i]} (${share.toFixed(1)}%)</div>
<div class="progress"><div class="bar" style="width:${share}%"></div></div>
`;

});

}

function saveData(){

let data={
types:typeInputs.map(i=>i.value),
ranks:rankInputs.map(i=>i.value),
typeBuff:buffTypeInputs.map(i=>i.value),
rankBuff:buffRankInputs.map(i=>i.value),
allBuff:allBuffInput.value
};

localStorage.setItem("isekaiPowerCalc",JSON.stringify(data));

}

function loadData(){

let data=localStorage.getItem("isekaiPowerCalc");
if(!data) return;

data=JSON.parse(data);

data.types?.forEach((v,i)=>typeInputs[i].value=v);
data.ranks?.forEach((v,i)=>rankInputs[i].value=v);
data.typeBuff?.forEach((v,i)=>buffTypeInputs[i].value=v);
data.rankBuff?.forEach((v,i)=>buffRankInputs[i].value=v);
if(data.allBuff) allBuffInput.value=data.allBuff;

}

function resetAll(){

localStorage.removeItem("isekaiPowerCalc");
location.reload();

}

function copyResult(){

let text=
document.getElementById("totalPower").innerText+"\n"+
document.getElementById("gainPower").innerText+"\n"+
document.getElementById("newPower").innerText;

navigator.clipboard.writeText(text);
alert("Copied");

}

init();

</script>

</body>
</html>
