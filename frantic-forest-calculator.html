body{

body.dark input,

.topButtons{
display:flex;

}

button{
border:none;
padding:9px 14px;

table{
width:100%;
border-collapse:collapse;

}

th{

}

td{
padding:10px;
text-align:center;

}

body.dark th{

}

.killable{
background:#e8f7ee;
}

.best{
background:#4c6fff;

font-weight:700;
}

.scoreGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:10px;
}

.scoreItem{
display:flex;
align-items:center;
justify-content:space-between;
background:#f4f7ff;
padding:8px 10px;

}

body.dark .scoreItem{
background:#1f2436;

.resultGrid{
display:flex;

.resultBox{
background:#f4f7ff;

}

body.dark .resultBox{
background:#1f2436;
}

.resultTitle{
font-size:14px;
opacity:.7;
}

.resultValue{
font-size:34px;
font-weight:700;
margin-top:5px;
}

.copyBtn{
margin-top:10px;
background:#4c6fff;
}

@media(max-width:600px){

.row{
flex-direction:column;
align-items:flex-start;
}

label{
width:auto;
}

}

</style>
</head>
