<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Isekai Adventure Life Frantic Forest Calculator</title>

<style>

*{
box-sizing:border-box;
transition:0.2s;
}

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(180deg,#eef3ff,#dce7ff);
display:flex;
justify-content:center;
}

body.dark{
background:#1b1e2b;
color:white;
}

body.dark .section{
background:#2a2f44;
}

body.dark input,body.dark select{
background:#1f2436;
color:white;
}

body.dark table{
background:#2a2f44;
}

body.dark .best{
background:#2f5aff;
color:white;
}

.container{
width:950px;
max-width:95%;
padding:20px;
}

h1{
text-align:center;
color:#3b4ba8;
font-size:28px;
margin-bottom:4px;
}

.subtitle{
text-align:center;
font-size:13px;
color:#6b7280;
margin-bottom:20px;
}

.section{
background:white;
border-radius:16px;
padding:20px;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.topButtons{
display:flex;
gap:10px;
margin-bottom:12px;
}

button{
border:none;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
font-weight:600;
color:white;
}

.homeBtn{background:#555;}
.darkBtn{background:#222;}

.playerRow{
display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
}

.playerRow label{
width:120px;
font-weight:600;
}

input{
width:120px;
padding:8px;
border-radius:8px;
border:none;
background:#f1f4ff;
font-size:15px;
text-align:center;
}

select{
width:60px;
padding:8px;
border-radius:8px;
border:none;
background:#f1f4ff;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
border-radius:12px;
overflow:hidden;
}

th{
background:#eef2ff;
padding:12px;
font-weight:600;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f8f9ff;
}

.best{
background:#6c8cff !important;
color:white;
font-weight:700;
}

.result{
text-align:center;
}

.resultRow{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.resultBox{
background:#f4f7ff;
padding:18px;
border-radius:12px;
min-width:130px;
font-weight:600;
}

.resultBox div{
font-size:28px;
margin-top:6px;
}

.scoreList{
margin-top:14px;
display:flex;
flex-direction:column;
gap:6px;
font-weight:600;
}

.buttonRow{
margin-top:20px;
display:flex;
justify-content:center;
gap:12px;
}

.copyBtn{background:#3fa34d;}
.resetBtn{background:#ff6b6b;}

</style>
</head>

<body>

<div class="container">

<h1>Isekai Adventure Life Frantic Forest Calculator</h1>
<div class="subtitle">v1.1 • dev by cozyneko guild</div>

<div class="topButtons">

<button class="homeBtn" onclick="location.href='index.html'">
🏠 Home
</button>

<button class="darkBtn" onclick="toggleDark()">
🌙 Dark Mode
</button>

</div>


<div class="section">

<h3>Player Setup</h3>

<div class="playerRow">

<label>Player Power</label>

<input id="power" placeholder="5">

<select id="powerUnit">
<option value="1">Normal</option>
<option value="1000000">M</option>
<option value="1000000000" selected>B</option>
<option value="1000000000000">T</option>
</select>

</div>

<div class="playerRow">

<label>Bells</label>

<input id="bells" placeholder="120">

</div>

</div>


<div class="section">

<h3>Stable HP</h3>

<table id="stableTable">

<tr>
<th>Stable</th>
<th>HP (B)</th>
</tr>

<tr>
<td>Stable 1</td>
<td><input id="hp1" value="3.295"></td>
</tr>

<tr>
<td>Stable 2</td>
<td><input id="hp2" value="4.975"></td>
</tr>

<tr>
<td>Stable 3</td>
<td><input id="hp3" value="6.590"></td>
</tr>

<tr>
<td>Stable 4</td>
<td><input id="hp4" value="9.885"></td>
</tr>

<tr>
<td>Stable 5</td>
<td><input id="hp5" value="13.180"></td>
</tr>

<tr>
<td>Stable 6</td>
<td><input id="hp6" value="26.360"></td>
</tr>

<tr>
<td>Stable 7</td>
<td><input id="hp7" value="49.425"></td>
</tr>

</table>

</div>


<div class="section result">

<h3>Result</h3>

<div class="resultRow">

<div class="resultBox">
Best Stable
<div id="bestStable">0</div>
</div>

<div class="resultBox">
Score
<div id="score">0</div>
</div>

</div>

<div class="scoreList">

<div>S4 : 735 points</div>
<div>S5 : 1000 points</div>
<div>S6 : 2040 points</div>
<div>S7 : 3900 points</div>

</div>

<div class="buttonRow">

<button class="copyBtn" onclick="copyResult()">Copy Result</button>
<button class="resetBtn" onclick="resetAll()">Reset</button>

</div>

</div>

</div>

<script>

const scoreTable=[0,0,0,735,1000,2040,3900]

const inputs=document.querySelectorAll("input,select")

inputs.forEach(i=>{
i.addEventListener("input",calc)
})

function getStableHP(){

return[
parseFloat(hp1.value),
parseFloat(hp2.value),
parseFloat(hp3.value),
parseFloat(hp4.value),
parseFloat(hp5.value),
parseFloat(hp6.value),
parseFloat(hp7.value)
]

}

function calc(){

let power=powerInput()
let bells=parseFloat(document.getElementById("bells").value)

if(!power||!bells)return

let damage=power*bells

let stableHP=getStableHP()

let best=0

for(let i=0;i<stableHP.length;i++){

let hp=stableHP[i]*1000000000

if(damage>=hp){
best=i+1
}

}

document.getElementById("bestStable").innerText=best
document.getElementById("score").innerText=scoreTable[best]

highlight(best)

}

function powerInput(){

let p=document.getElementById("power").value
let unit=document.getElementById("powerUnit").value

return p*unit

}

function highlight(best){

let rows=document.querySelectorAll("#stableTable tr")

rows.forEach(r=>r.classList.remove("best"))

if(best>0){
rows[best].classList.add("best")
}

}

function copyResult(){

let text=
`Frantic Forest Result

Best Stable: ${bestStable.innerText}
Score: ${score.innerText}`

navigator.clipboard.writeText(text)

alert("Copied!")

}

function resetAll(){

document.querySelectorAll("input").forEach(i=>{
if(i.id.includes("hp"))return
i.value=""
})

bestStable.innerText=0
score.innerText=0

document.querySelectorAll("#stableTable tr").forEach(r=>{
r.classList.remove("best")
})

}

function toggleDark(){

document.body.classList.toggle("dark")

localStorage.setItem(
"darkmode",
document.body.classList.contains("dark")
)

}

if(localStorage.getItem("darkmode")==="true"){
document.body.classList.add("dark")
}

</script>

</body>
</html>
