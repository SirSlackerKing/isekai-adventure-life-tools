<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Frantic Forest Calculator</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{
margin:0;
background:#eef2ff;
display:flex;
justify-content:center;
}

body.dark{
background:#1e2233;
color:white;
}

.container{
width:1000px;
max-width:95%;
padding:20px;
}

.section{
background:white;
padding:20px;
border-radius:14px;
margin-bottom:20px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

body.dark .section{
background:#2a2f44;
}

.row{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
}

label{
width:160px;
font-weight:600;
}

input,select{
padding:8px;
border-radius:8px;
border:none;
background:#f1f4ff;
width:100px;
text-align:center;
}

body.dark input,
body.dark select{
background:#1f2436;
color:white;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#eef2ff;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

body.dark th{
background:#3a4060;
}

.killable{
background:#4caf50;
color:white;
font-weight:600;
}

.best{
background:#4c6fff;
color:white;
font-weight:700;
}

.resultGrid{
display:flex;
gap:20px;
justify-content:center;
margin-top:10px;
}

.resultBox{
background:#f4f7ff;
padding:15px;
border-radius:10px;
text-align:center;
min-width:160px;
}

body.dark .resultBox{
background:#1f2436;
}

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:600;
margin-right:8px;
}

.home{background:#555}
.darkbtn{background:#222}

</style>
</head>

<body>

<div class="container">

<h2>Frantic Forest Calculator</h2>

<button class="home" onclick="location.href='index.html'">Home</button>
<button class="darkbtn" onclick="toggleDark()">Dark</button>


<div class="section">

<h3>Player Setup</h3>

<div class="row">
<label>Base Power</label>
<input id="power" value="50">
<select id="unit">
<option value="1e6">M</option>
<option value="1e9" selected>B</option>
<option value="1e12">T</option>
</select>
</div>

<div class="row">
<label>Bonus %</label>
<input id="bonus" value="0">
</div>

<div class="row">
<label>Total Bells</label>
<input id="bells" value="100">
</div>

<div class="row">
<label>Damage / Bell</label>
<input id="damage" disabled>
</div>

</div>


<div class="section">

<h3>Stable Table</h3>

<table id="stableTable">

<tr>
<th>Stable</th>
<th>HP (B)</th>
<th>Kill</th>
<th>Score</th>
</tr>

<tr>
<td>1</td>
<td><input id="hp1" value="3.295"></td>
<td id="k1"></td>
<td id="s1"></td>
</tr>

<tr>
<td>2</td>
<td><input id="hp2" value="4.985"></td>
<td id="k2"></td>
<td id="s2"></td>
</tr>

<tr>
<td>3</td>
<td><input id="hp3" value="6.591"></td>
<td id="k3"></td>
<td id="s3"></td>
</tr>

<tr>
<td>4</td>
<td><input id="hp4" value="9.887"></td>
<td id="k4"></td>
<td id="s4"></td>
</tr>

<tr>
<td>5</td>
<td><input id="hp5" value="13.18"></td>
<td id="k5"></td>
<td id="s5"></td>
</tr>

<tr>
<td>6</td>
<td><input id="hp6" value="26.36"></td>
<td id="k6"></td>
<td id="s6"></td>
</tr>

<tr>
<td>7</td>
<td><input id="hp7" value="49.43"></td>
<td id="k7"></td>
<td id="s7"></td>
</tr>

</table>

</div>


<div class="section">

<h3>Stable Score</h3>

<div class="row">Stable1 score <input id="sc1" value="0"></div>
<div class="row">Stable2 score <input id="sc2" value="0"></div>
<div class="row">Stable3 score <input id="sc3" value="0"></div>
<div class="row">Stable4 score <input id="sc4" value="735"></div>
<div class="row">Stable5 score <input id="sc5" value="1000"></div>
<div class="row">Stable6 score <input id="sc6" value="2040"></div>
<div class="row">Stable7 score <input id="sc7" value="3900"></div>

</div>


<div class="section">

<h3>Result</h3>

<div class="resultGrid">

<div class="resultBox">
Recommended Stable
<div id="bestStable">-</div>
</div>

<div class="resultBox">
Total Score
<div id="totalScore">0</div>
</div>

</div>

</div>


<div class="section">

<h3>Event Progress Simulator</h3>

<div class="row">
<label>Current Score</label>
<input id="current">
</div>

<div class="row">
<label>Target Score</label>
<input id="target">
</div>

<div class="row">
<label>Bells Needed</label>
<input id="needBell" disabled>
</div>

</div>

</div>


<script>

const inputs=document.querySelectorAll("input,select")

inputs.forEach(i=>i.addEventListener("input",calc))

function calc(){

let base=parseFloat(document.getElementById("power").value)
let unit=parseFloat(document.getElementById("unit").value)
let bonus=parseFloat(document.getElementById("bonus").value)||0
let bells=parseFloat(document.getElementById("bells").value)||0

let damage=base*unit*(1+bonus/100)

document.getElementById("damage").value=(damage/1e9).toFixed(2)+" B"

let bestStable=0
let bestScore=0

for(let i=1;i<=7;i++){

let hp=parseFloat(document.getElementById("hp"+i).value)*1e9
let score=parseFloat(document.getElementById("sc"+i).value)||0

let kill=damage>=hp?1:0

document.getElementById("k"+i).innerText=kill
document.getElementById("s"+i).innerText=kill?score:0

let row=document.querySelectorAll("#stableTable tr")[i]

row.classList.remove("killable")

if(kill){
row.classList.add("killable")
}

if(kill && score>bestScore){
bestScore=score
bestStable=i
}

}

highlight(bestStable)

document.getElementById("bestStable").innerText=
bestStable?"Stable "+bestStable:"-"

document.getElementById("totalScore").innerText=bestScore*bells

progress(bestScore)

}

function highlight(n){

let rows=document.querySelectorAll("#stableTable tr")

rows.forEach(r=>r.classList.remove("best"))

if(n>0){
rows[n].classList.add("best")
}

}

function progress(score){

let cur=parseFloat(document.getElementById("current").value)||0
let target=parseFloat(document.getElementById("target").value)||0

let remain=target-cur

if(remain<=0){
document.getElementById("needBell").value=0
return
}

if(score>0){
document.getElementById("needBell").value=Math.ceil(remain/score)
}

}

function toggleDark(){
document.body.classList.toggle("dark")
}

calc()

</script>

</body>
</html>
