<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Frantic Forest Calculator</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{
margin:0;
background:#eef2ff;
display:flex;
justify-content:center;
}

body.dark{
background:#1e2233;
color:white;
}

.container{
width:1100px;
max-width:95%;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:26px;
font-weight:700;
}

.section{
background:white;
padding:20px;
border-radius:14px;
margin-bottom:20px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

body.dark .section{
background:#2a2f44;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.field{
display:flex;
flex-direction:column;
gap:4px;
}

input,select{
padding:8px;
border-radius:8px;
border:none;
background:#f1f4ff;
text-align:center;
}

body.dark input,
body.dark select{
background:#1f2436;
color:white;
}

.bonusControl{
display:flex;
gap:6px;
}

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:600;
}

.smallBtn{
width:34px;
background:#4c6fff;
}

.darkbtn{background:#222}

.copybtn{background:#4caf50}

.sharebtn{background:#6a4cff}

table{
width:100%;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

th{
background:#5a6cff;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

.killable{
background:#4caf50;
color:white;
}

.best{
background:#4c6fff;
color:white;
font-weight:700;
}

.resultGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:10px;
}

.resultBox{
background:linear-gradient(135deg,#5a6cff,#7c8cff);
color:white;
padding:20px;
border-radius:12px;
text-align:center;
font-size:18px;
}

.resultBox div{
font-size:28px;
margin-top:6px;
font-weight:700;
}

.progressBar{
height:16px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progressFill{
height:100%;
background:#4caf50;
width:0%;
}

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

.resultGrid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="title">Frantic Forest Calculator</div>

<div>
<button class="darkbtn" onclick="toggleDark()">Dark</button>
<button class="copybtn" onclick="copyResult()">Copy</button>
<button class="sharebtn" onclick="shareBuild()">Share</button>
</div>
</div>


<div class="section">

<h3>Player Setup</h3>

<div class="grid">

<div class="field">
<label>Base Power</label>
<input id="power" value="50">
</div>

<div class="field">
<label>Unit</label>
<select id="unit">
<option value="1e6">M</option>
<option value="1e9" selected>B</option>
<option value="1e12">T</option>
</select>
</div>

<div class="field">
<label>Bonus</label>

<div class="bonusControl">
<button class="smallBtn" onclick="changeBonus(-5)">-</button>
<input id="bonus" value="0">
<button class="smallBtn" onclick="changeBonus(5)">+</button>
</div>

<div>
Lv <span id="bonusLevel">0</span> |
Crystal <span id="crystalCost">0</span>
</div>

</div>

<div class="field">
<label>Total Bells</label>
<input id="bells" value="100">
</div>

<div class="field">
<label>Damage / Bell</label>
<input id="damage" disabled>
</div>

</div>

</div>


<div class="section">

<h3>Stable Table</h3>

<table id="stableTable">

<tr>
<th>Stable</th>
<th>HP (B)</th>
<th>Kill</th>
<th>Score</th>
</tr>

<tr>
<td>1</td>
<td><input id="hp1" value="3.295"></td>
<td id="k1"></td>
<td id="s1"></td>
</tr>

<tr>
<td>2</td>
<td><input id="hp2" value="4.985"></td>
<td id="k2"></td>
<td id="s2"></td>
</tr>

<tr>
<td>3</td>
<td><input id="hp3" value="6.591"></td>
<td id="k3"></td>
<td id="s3"></td>
</tr>

<tr>
<td>4</td>
<td><input id="hp4" value="9.887"></td>
<td id="k4"></td>
<td id="s4"></td>
</tr>

<tr>
<td>5</td>
<td><input id="hp5" value="13.18"></td>
<td id="k5"></td>
<td id="s5"></td>
</tr>

<tr>
<td>6</td>
<td><input id="hp6" value="26.36"></td>
<td id="k6"></td>
<td id="s6"></td>
</tr>

<tr>
<td>7</td>
<td><input id="hp7" value="49.43"></td>
<td id="k7"></td>
<td id="s7"></td>
</tr>

</table>

</div>


<div class="section">

<h3>Stable Score</h3>

<div class="grid">

<div class="field">Stable1 <input id="sc1" value="0"></div>
<div class="field">Stable2 <input id="sc2" value="0"></div>
<div class="field">Stable3 <input id="sc3" value="0"></div>
<div class="field">Stable4 <input id="sc4" value="735"></div>
<div class="field">Stable5 <input id="sc5" value="1000"></div>
<div class="field">Stable6 <input id="sc6" value="2040"></div>
<div class="field">Stable7 <input id="sc7" value="3900"></div>

</div>

</div>


<div class="section">

<h3>Result</h3>

<div class="resultGrid">

<div class="resultBox">
Best Stable
<div id="bestStable">-</div>
</div>

<div class="resultBox">
Total Score
<div id="totalScore">0</div>
</div>

</div>

</div>


<div class="section">

<h3>Next Stable Upgrade</h3>

<div id="nextUpgrade">
-
</div>

</div>


<div class="section">

<h3>Target Planner</h3>

<div class="grid">

<div class="field">
<label>Current Score</label>
<input id="current">
</div>

<div class="field">
<label>Target Score</label>
<input id="target">
</div>

<div class="field">
<label>Bells Needed</label>
<input id="needBell" disabled>
</div>

</div>

<div class="progressBar">
<div class="progressFill" id="progressFill"></div>
</div>

</div>


</div>


<script>

const inputs=document.querySelectorAll("input,select")
inputs.forEach(i=>i.addEventListener("input",calc))

function changeBonus(step){

let b=document.getElementById("bonus")

let v=parseFloat(b.value)||0

v+=step

if(v<0)v=0

b.value=v

calc()

}

function calc(){

let base=parseFloat(power.value)||0
let unit=parseFloat(unit.value)||1
let bonus=parseFloat(bonus.value)||0
let bells=parseFloat(bells.value)||0

let baseDamage=base*unit
let damage=baseDamage*(1+bonus/100)

document.getElementById("damage").value=(damage/1e9).toFixed(2)+" B"

let level=bonus/5
let crystal=level*20

bonusLevel.innerText=level
crystalCost.innerText=crystal

let bestStable=0
let bestScore=0

for(let i=1;i<=7;i++){

let hp=parseFloat(document.getElementById("hp"+i).value)*1e9
let score=parseFloat(document.getElementById("sc"+i).value)||0

let kill=damage>=hp?1:0

document.getElementById("k"+i).innerText=kill
document.getElementById("s"+i).innerText=kill?score:0

let row=document.querySelectorAll("#stableTable tr")[i]

row.classList.remove("killable","best")

if(kill){
row.classList.add("killable")
}

if(kill && score>bestScore){
bestScore=score
bestStable=i
}

}

if(bestStable>0){
document.querySelectorAll("#stableTable tr")[bestStable].classList.add("best")
}

bestStableText=bestStable?("Stable "+bestStable):"-"

document.getElementById("bestStable").innerText=bestStableText

document.getElementById("totalScore").innerText=bestScore*bells

nextStable(bestStable,baseDamage,bestScore)

planner(bestScore)

}

function nextStable(best,baseDamage,currentScore){

let next=best+1

if(next>7){
nextUpgrade.innerText="Max Stable"
return
}

let hp=parseFloat(document.getElementById("hp"+next).value)*1e9
let score=parseFloat(document.getElementById("sc"+next).value)||0

let needBonus=((hp/baseDamage)-1)*100

if(needBonus<0)needBonus=0

let level=Math.ceil(needBonus/5)

let crystal=level*20

let gain=score-currentScore

nextUpgrade.innerText=
"Next Stable "+next+
" | Need Bonus "+needBonus.toFixed(1)+"%"+
" | Crystal "+crystal+
" | Score Gain "+gain

}

function planner(score){

let cur=parseFloat(current.value)||0
let target=parseFloat(target.value)||0

let remain=target-cur

if(remain<=0){
needBell.value=0
return
}

if(score>0){
needBell.value=Math.ceil(remain/score)
}

let percent=0

if(target>0){
percent=(cur/target)*100
}

progressFill.style.width=percent+"%"

}

function toggleDark(){
document.body.classList.toggle("dark")
}

function copyResult(){

let text=

"Power "+power.value+"\n"+
"Bonus "+bonus.value+"%\n"+
"Best Stable "+bestStable.innerText+"\n"+
"Total Score "+totalScore.innerText

navigator.clipboard.writeText(text)

}

function shareBuild(){

let url=
location.origin+
location.pathname+
"?power="+power.value+
"&bonus="+bonus.value

navigator.clipboard.writeText(url)

alert("Build link copied")

}

calc()

</script>

</body>
</html>
