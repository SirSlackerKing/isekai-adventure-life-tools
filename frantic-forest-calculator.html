<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Isekai Adventure Life Frantic Forest Calculator</title>

<style>

*{
box-sizing:border-box;
transition:0.2s;
}

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(180deg,#eef3ff,#dce7ff);
display:flex;
justify-content:center;
}

body.dark{
background:#1b1e2b;
color:white;
}

body.dark .section{
background:#2a2f44;
}

body.dark input, body.dark select{
background:#1f2436;
color:white;
}

body.dark .result{
background:#2a2f44;
}

body.dark .resultBox{
background:#3a4060;
}

.container{
width:1000px;
max-width:95%;
padding:20px;
}

h1{
text-align:center;
color:#3b4ba8;
font-size:28px;
margin-bottom:4px;
}

.subtitle{
text-align:center;
font-size:13px;
color:#6b7280;
margin-bottom:18px;
}

.section{
background:white;
border-radius:16px;
padding:18px;
margin-bottom:18px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.tab{
background:#f4f7ff;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.tab.active{
background:#6c8cff;
color:white;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
margin-bottom:8px;
}

input{
border:none;
border-radius:6px;
padding:6px;
width:90px;
text-align:center;
}

select{
border:none;
border-radius:6px;
padding:6px;
}

.result{
background:white;
border-radius:16px;
padding:30px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
align-items:center;
}

.resultRow{
display:flex;
justify-content:center;
gap:16px;
flex-wrap:wrap;
}

.resultBox{
background:#f4f7ff;
padding:14px 24px;
border-radius:12px;
font-size:14px;
font-weight:600;
min-width:120px;
text-align:center;
}

.resultBox div{
font-size:20px;
margin-top:4px;
}

.buttonRow{
margin-top:20px;
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}

.actionBtn{
border:none;
padding:10px 18px;
font-size:14px;
font-weight:600;
border-radius:10px;
cursor:pointer;
color:white;
}

.copyBtn{background:linear-gradient(135deg,#5dbb63,#3fa34d);}
.resetBtn{background:#ff6b6b;}
shareBtn{background:#5865F2;}
homeBtn{background:#555;}
darkBtn{background:#222;}

</style>

</head>

<body>

<div class="container">

<h1>Isekai Adventure Life Frantic Forest Calculator</h1>
<div class="subtitle">dev by cozyneko guild</div>

<div style="display:flex;gap:10px;margin-bottom:10px;">

<button class="actionBtn" style="background:#555"
onclick="location.href='index.html'">
🏠 Home </button>

<button class="actionBtn" style="background:#222"
onclick="toggleDark()">
🌙 Dark Mode </button>

</div>

<div class="section">

<h2>Event Config</h2>

<div class="row">

Stable1 HP

<input id="s1hp" value="3.295">

<select id="hpUnit">
<option>K</option>
<option>M</option>
<option selected>B</option>
<option>T</option>
<option>aa</option>
<option>ab</option>
<option>ac</option>
</select>

<button class="actionBtn" style="background:#6c8cff" onclick="generateHP()">Generate</button>

</div>

<div id="hpTable"></div>

<div class="row">

S4 Score <input id="s4" value="735">
S5 Score <input id="s5" value="1000">
S6 Score <input id="s6" value="2040">
S7 Score <input id="s7" value="3900">

</div>

</div>

<div class="section">

<div class="row">

Power

<input id="playerPower">

<select id="playerUnit">
<option>K</option>
<option>M</option>
<option selected>B</option>
<option>T</option>
<option>aa</option>
<option>ab</option>
<option>ac</option>
</select>

Bells

<input id="playerBells">

</div>

</div>

<div class="result">

<div class="resultRow">

<div class="resultBox">
Best Stable
<div id="bestStable">0</div>
</div>

<div class="resultBox">
Score
<div id="score">0</div>
</div>

</div>

<div class="buttonRow">

<button class="actionBtn copyBtn" onclick="copyResult()">Copy Result</button> <button class="actionBtn resetBtn" onclick="resetAll()">Reset</button>

</div>

</div>

</div>

<script>

let stableHP=[3.295,4.985,6.591,9.887,13.18,26.36,49.43]

const units={
K:1e3,
M:1e6,
B:1e9,
T:1e12,
aa:1e15,
ab:1e18,
ac:1e21
}

function convert(v,u){
return v*units[u]
}

function getScores(){
return[
0,
0,
0,
parseInt(s4.value)||0,
parseInt(s5.value)||0,
parseInt(s6.value)||0,
parseInt(s7.value)||0
]
}

function generateHP(){

let base=parseFloat(s1hp.value)||0

stableHP=[
base,
base*1.51,
base*2,
base*3,
base*4,
base*8,
base*15
]

let html=""

stableHP.forEach((v,i)=>{
html+=`Stable ${i+1} : ${v.toFixed(3)} ${hpUnit.value}<br>`
})

hpTable.innerHTML=html

autoCalc()

}

function calculate(power,bells){

let scores=getScores()

let bestScore=0
let bestStable=0

stableHP.forEach((hp,i)=>{

let hits=Math.ceil(convert(hp,hpUnit.value)/power)

let kills=Math.floor(bells/hits)

let score=kills*hits*scores[i]

if(score>bestScore){
bestScore=score
bestStable=i+1
}

})

bestStableEl.innerText=bestStable
scoreEl.innerText=bestScore

}

function autoCalc(){

let power=parseFloat(playerPower.value)
let bells=parseInt(playerBells.value)

if(!power||!bells) return

power=convert(power,playerUnit.value)

calculate(power,bells)

}

function resetAll(){

document.querySelectorAll("input").forEach(i=>i.value="")
bestStableEl.innerText=0
scoreEl.innerText=0

}

function copyResult(){

let text=`Frantic Forest Result

Best Stable: ${bestStableEl.innerText}
Score: ${scoreEl.innerText}`

navigator.clipboard.writeText(text)

alert("Copied!")

}

function toggleDark(){

document.body.classList.toggle("dark")

localStorage.setItem(
"darkmode",
document.body.classList.contains("dark")
)

}

if(localStorage.getItem("darkmode")==="true"){
document.body.classList.add("dark")
}

const bestStableEl=document.getElementById("bestStable")
const scoreEl=document.getElementById("score")

generateHP()

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",autoCalc)
})

document.querySelectorAll("select").forEach(s=>{
s.addEventListener("change",autoCalc)
})

</script>

</body>
</html>
