<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Frantic Forest Calculator</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

body{
margin:0;
background:#eef2ff;
display:flex;
justify-content:center;
}

body.dark{
background:#1e2233;
color:white;
}

.container{
width:1000px;
max-width:95%;
padding:20px;
}

h1{
text-align:center;
margin-bottom:6px;
}

.dev{
text-align:center;
font-size:13px;
margin-bottom:20px;
opacity:.7;
}

.section{
background:white;
padding:20px;
border-radius:14px;
margin-bottom:20px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

body.dark .section{
background:#2a2f44;
}

.row{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
}

label{
width:170px;
font-weight:600;
}

input,select{
padding:10px;
border-radius:8px;
border:none;
background:#f1f4ff;
width:110px;
text-align:center;
font-size:14px;
}

body.dark input,
body.dark select{
background:#1f2436;
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#eef2ff;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

body.dark th{
background:#3a4060;
}

.killable{
background:#4caf50;
color:white;
font-weight:600;
}

.best{
background:#4c6fff;
color:white;
font-weight:700;
}

.topButtons{
display:flex;
gap:10px;
margin-bottom:10px;
}

button{
border:none;
padding:9px 14px;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:600;
}

.home{background:#555}
.darkbtn{background:#222}
.copy{background:#4c6fff}

.resultGrid{
display:flex;
gap:20px;
justify-content:center;
margin-top:10px;
flex-wrap:wrap;
}

.resultBox{
background:#f4f7ff;
padding:20px;
border-radius:12px;
text-align:center;
min-width:180px;
}

body.dark .resultBox{
background:#1f2436;
}

.resultTitle{
font-size:14px;
opacity:.7;
}

.resultValue{
font-size:32px;
font-weight:700;
margin-top:5px;
}

.damageHero{
font-size:22px;
font-weight:700;
color:#4c6fff;
}

</style>
</head>

<body>

<div class="container">

<h1>Frantic Forest Calculator</h1>
<div class="dev">v4.5 • dev by cozyneko</div>

<div class="topButtons">
<button class="home" onclick="location.href='index.html'">Home</button>
<button class="darkbtn" onclick="toggleDark()">Dark Mode</button>
<button class="copy" onclick="copyResult()">Copy Result</button>
</div>

<!-- PLAYER -->

<div class="section">

<h3>Player Setup</h3>

<div class="row">
<label>Base Power</label>
<input id="power">
<select id="unit">
<option value="1e6">M</option>
<option value="1e9" selected>B</option>
<option value="1e12">T</option>
<option value="1e15">aa</option>
</select>
</div>

<div class="row">
<label>Bonus %</label>
<input id="bonus">
</div>

<div class="row">
<label>Total Bells</label>
<input id="bells">
</div>

<div class="row">
<label>Damage / Bell</label>
<div class="damageHero" id="damage">-</div>
</div>

</div>

<!-- STABLE TABLE -->

<div class="section">

<h3>Stable Table</h3>

<table id="stableTable">

<tr>
<th>Stable</th>
<th>HP (B)</th>
<th>Kill</th>
<th>Score</th>
<th>Power Needed</th>
</tr>

<tr>
<td>1</td>
<td><input id="hp1" value="3.295"></td>
<td id="k1"></td>
<td id="s1"></td>
<td id="need1"></td>
</tr>

<tr>
<td>2</td>
<td><input id="hp2" value="4.985"></td>
<td id="k2"></td>
<td id="s2"></td>
<td id="need2"></td>
</tr>

<tr>
<td>3</td>
<td><input id="hp3" value="6.591"></td>
<td id="k3"></td>
<td id="s3"></td>
<td id="need3"></td>
</tr>

<tr>
<td>4</td>
<td><input id="hp4" value="9.887"></td>
<td id="k4"></td>
<td id="s4"></td>
<td id="need4"></td>
</tr>

<tr>
<td>5</td>
<td><input id="hp5" value="13.18"></td>
<td id="k5"></td>
<td id="s5"></td>
<td id="need5"></td>
</tr>

<tr>
<td>6</td>
<td><input id="hp6" value="26.36"></td>
<td id="k6"></td>
<td id="s6"></td>
<td id="need6"></td>
</tr>

<tr>
<td>7</td>
<td><input id="hp7" value="49.43"></td>
<td id="k7"></td>
<td id="s7"></td>
<td id="need7"></td>
</tr>

</table>

</div>

<!-- SCORE -->

<div class="section">

<h3>Score per Kill</h3>

<div class="row">Stable 1 <input id="sc1"></div>
<div class="row">Stable 2 <input id="sc2"></div>
<div class="row">Stable 3 <input id="sc3"></div>
<div class="row">Stable 4 <input id="sc4" value="735"></div>
<div class="row">Stable 5 <input id="sc5" value="1000"></div>
<div class="row">Stable 6 <input id="sc6" value="2040"></div>
<div class="row">Stable 7 <input id="sc7" value="3900"></div>

</div>

<!-- RESULT -->

<div class="section">

<h3>Result</h3>

<div class="resultGrid">

<div class="resultBox">
<div class="resultTitle">Recommended Stable</div>
<div class="resultValue" id="bestStable">-</div>
</div>

<div class="resultBox">
<div class="resultTitle">Score / Bell</div>
<div class="resultValue" id="scoreBell">-</div>
</div>

<div class="resultBox">
<div class="resultTitle">Total Score</div>
<div class="resultValue" id="totalScore">-</div>
</div>

</div>

</div>

<!-- EVENT SIM -->

<div class="section">

<h3>Event Progress Simulator</h3>

<div class="row">
<label>Current Score</label>
<input id="current">
</div>

<div class="row">
<label>Target Score</label>
<input id="target">
</div>

<div class="row">
<label>Bells Needed</label>
<input id="needBell" disabled>
</div>

</div>

</div>


<script>

const inputs=document.querySelectorAll("input,select")
inputs.forEach(i=>i.addEventListener("input",calc))

function calc(){

let base=parseFloat(power.value)
let unitValue=parseFloat(unit.value)
let bonusValue=parseFloat(bonus.value)||0
let bellsValue=parseFloat(bells.value)||0

if(!base)return

let damage = base * unitValue * (1 + bonusValue/100)

damageDisplay=(damage/1e9).toFixed(2)+" B"

document.getElementById("damage").innerText=damageDisplay

let bestStable=0
let bestScore=0

for(let i=1;i<=7;i++){

let hp=parseFloat(document.getElementById("hp"+i).value)*1e9
let score=parseFloat(document.getElementById("sc"+i).value)||0

let kill = damage>=hp

document.getElementById("k"+i).innerText=kill?"✓":"—"
document.getElementById("s"+i).innerText=kill?score:0

let need = hp-damage

document.getElementById("need"+i).innerText=
need>0?(need/1e9).toFixed(2)+"B":"✓"

if(kill && score>bestScore){

bestScore=score
bestStable=i

}

}

highlight(bestStable)

document.getElementById("bestStable").innerText=bestStable?("Stable "+bestStable):"-"
document.getElementById("scoreBell").innerText=bestScore||"-"

let total=bestScore*bellsValue

document.getElementById("totalScore").innerText=total||"-"

progress(bestScore)

}

function highlight(n){

let rows=document.querySelectorAll("#stableTable tr")

rows.forEach(r=>r.classList.remove("best"))

if(n>0){
rows[n].classList.add("best")
}

}

function progress(score){

let cur=parseFloat(current.value)||0
let target=parseFloat(target.value)||0

if(!score)return

let remain=target-cur
let need=Math.ceil(remain/score)

needBell.value=need>0?need:0

}

function copyResult(){

let dmg=document.getElementById("damage").innerText
let stable=document.getElementById("bestStable").innerText
let score=document.getElementById("scoreBell").innerText
let total=document.getElementById("totalScore").innerText

let text=
"Frantic Forest Result\n"+
"Damage/Bell : "+dmg+"\n"+
"Recommended : "+stable+"\n"+
"Score/Bell : "+score+"\n"+
"Total Score : "+total

navigator.clipboard.writeText(text)

alert("Result Copied")

}

function toggleDark(){
document.body.classList.toggle("dark")
}

</script>

</body>
</html>
