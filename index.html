<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Isekai Adventure Life Tools</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(180deg,#eef3ff,#dbe6ff);
display:flex;
justify-content:center;
}

.container{
width:1000px;
max-width:95%;
text-align:center;
padding:30px 0 60px 0;
}

.banner{
width:100%;
max-width:900px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
margin-bottom:30px;
}

h1{
color:#4056b3;
margin-bottom:40px;
}

.grid{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.card{
width:260px;
background:white;
border-radius:16px;
padding:30px;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
transition:all .25s;
}

.card:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:0 14px 35px rgba(0,0,0,0.25);
}

.cardTitle{
font-size:20px;
font-weight:600;
margin-bottom:10px;
}

.cardDesc{
font-size:14px;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<img src="isekai_banner.jpg" class="banner">

<h1>Isekai Adventure Life Tools</h1>

<div class="grid">

<div class="card"
onclick="location.href='intimacy_calculator.html'">

<div class="cardTitle">
❤️ Intimacy
</div>

<div class="cardDesc">
Calculate intimacy points
</div>

</div>

<div class="card"
onclick="location.href='blessing_calculator.html'">

<div class="cardTitle">
✨ Blessing
</div>

<div class="cardDesc">
Calculate blessing points
</div>

</div>

</div>

</div>

</body>
</html>
