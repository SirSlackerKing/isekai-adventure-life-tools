<!DOCTYPE html>

}

}

</style>

</head>

<body>

<div class="box">

<h2>Intimacy Calculator</h2>

<div class="item">
<div class="left">

</div>

</div>

<div class="item">
<div class="left">
<img src="images/song_green_castle.png">
Song Book Green Castle
</div>
<input type="number" value="0">
</div>

<div class="item">
<div class="left">

</div>

</div>

</html>
