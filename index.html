<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Isekai Intimacy Calculator</title>

<style>

body{
background:#0f1221;
font-family:Segoe UI,Arial;
color:white;
margin:0;
display:flex;
justify-content:center;
}

.container{
width:900px;
max-width:95%;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.section{
background:#1a1e35;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.section h2{
margin-top:0;
}

.item{
display:flex;
align-items:center;
justify-content:space-between;
margin:8px 0;
background:#252a4a;
padding:8px 12px;
border-radius:8px;
}

.left{
display:flex;
align-items:center;
gap:10px;
}

.item img{
width:36px;
}

.controls{
display:flex;
align-items:center;
gap:8px;
}

button{
background:#3c6cff;
border:none;
color:white;
font-size:16px;
width:28px;
height:28px;
border-radius:6px;
cursor:pointer;
}

input{
width:50px;
text-align:center;
background:#11142a;
border:none;
color:white;
padding:4px;
border-radius:4px;
}

.result{
background:#1f2442;
padding:20px;
border-radius:12px;
text-align:center;
font-size:20px;
}

.result span{
display:block;
margin:6px 0;
}

.min{color:#7ed957;}
.avg{color:#6ec6ff;}
.max{color:#ffb86b;}

.familyBox{
display:flex;
justify-content:center;
margin-bottom:15px;
gap:10px;
align-items:center;
}

</style>
</head>

<body>

<div class="container">

<h1>Intimacy Calculator</h1>

<div class="section">

<div class="familyBox">

Family Count

<button onclick="change('family',-1)">-</button>
<input id="family" value="1">
<button onclick="change('family',1)">+</button>

</div>

</div>

<div class="section">

<h2>Random Items</h2>

<div id="randomItems"></div>

</div>

<div class="section">

<h2>Fixed Items</h2>

<div id="fixedItems"></div>

</div>

<div class="section">

<h2>Bonus</h2>

<div id="bonusItems"></div>

</div>

<div class="result">

<span class="min">Min : <span id="min">0</span></span>
<span class="avg">Avg : <span id="avg">0</span></span>
<span class="max">Max : <span id="max">0</span></span>

</div>

</div>

<script>

const randomItems=[

{name:"Song Book Green Heart",img:"song_green_heart.png",min:1,max:3},
{name:"Song Book Green Castle",img:"song_green_castle.png",min:2,max:3},
{name:"Song Book Blue Princess",img:"song_blue_princess.png",min:3,max:6},
{name:"Song Book Blue Prince",img:"song_blue_prince.png",min:4,max:10},
{name:"Song Book Purple Mushroom",img:"song_purple_mushroom.png",min:5,max:16},
{name:"Song Book Purple Star",img:"song_purple_star.png",min:7,max:24},
{name:"Song Book Black Book",img:"song_black_book.png",min:10,max:32},
{name:"Song Book Red Book",img:"song_red_book.png",min:14,max:49},
{name:"Intimacy Gachapon",img:"intimacy_gachapon.png",min:10,max:30}

]

const fixedItems=[

{name:"Diamond Ring",img:"diamond_ring.png",value:5},
{name:"Gem Ring",img:"gem_ring.png",value:2},
{name:"Gold Ring",img:"gold_ring.png",value:1},
{name:"Amber of Fish",img:"amber_fish.png",value:5}

]

const bonusItems=[

{name:"Family 2★ Skin",value:150},
{name:"Family 3★ Skin Unlock",value:300},
{name:"Family 3★ Skin Upgrade",value:500},
{name:"Family 4★ Skin Unlock",value:500},
{name:"Family 4★ Skin Upgrade",value:1000},
{name:"Fishing Antique",value:20,family:true},
{name:"Inn Gift",value:2,family:true},
{name:"Museum Antique",value:1,family:true},
{name:"Profile Figure",value:20,family:true}

]

function createItems(list,id){

let html=""

list.forEach((i,index)=>{

html+=`

<div class="item">

<div class="left">

${i.img?`<img src="images/${i.img}">`:""}

${i.name}

</div>

<div class="controls">

<button onclick="change('${id}${index}',-1)">-</button>

<input id="${id}${index}" value="0">

<button onclick="change('${id}${index}',1)">+</button>

</div>

</div>

`

})

document.getElementById(id).innerHTML=html

}

createItems(randomItems,"randomItems")
createItems(fixedItems,"fixedItems")
createItems(bonusItems,"bonusItems")

function change(id,amount){

let el=document.getElementById(id)

let v=parseInt(el.value||0)+amount

if(v<0)v=0

el.value=v

calc()

}

document.querySelectorAll("input").forEach(i=>i.oninput=calc)

function calc(){

let min=0
let max=0

randomItems.forEach((i,index)=>{

let c=parseInt(document.getElementById("randomItems"+index)?.value||0)

min+=c*i.min
max+=c*i.max

})

fixedItems.forEach((i,index)=>{

let c=parseInt(document.getElementById("fixedItems"+index)?.value||0)

min+=c*i.value
max+=c*i.value

})

let family=parseInt(document.getElementById("family").value||1)

bonusItems.forEach((i,index)=>{

let c=parseInt(document.getElementById("bonusItems"+index)?.value||0)

let val=i.value

if(i.family) val*=family

min+=c*val
max+=c*val

})

let avg=Math.floor((min+max)/2)

document.getElementById("min").innerText=min
document.getElementById("max").innerText=max
document.getElementById("avg").innerText=avg

}

calc()

</script>

</body>
</html>
